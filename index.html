<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>FOOTBALLIQ PRO | ELITE DASHBOARD</title>
    <style>
        :root { --neon: #00ff88; --bg: #050505; --panel: #121212; --border: #333; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        
        /* Layout Maestro de 3 Columnas */
        .dashboard { display: grid; grid-template-columns: 350px 1fr 1fr; gap: 20px; max-width: 1400px; margin: auto; }
        .panel { background: var(--panel); border: 1px solid var(--border); padding: 25px; border-radius: 18px; }
        h2 { color: var(--neon); text-transform: uppercase; font-size: 1.1rem; margin-bottom: 20px; }
        
        input { width: 100%; padding: 15px; margin: 10px 0; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--neon); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: black; text-transform: uppercase; }
        
        .metric-card { border: 1px solid var(--border); padding: 20px; border-radius: 12px; background: #1a1a1a; text-align: center; margin-bottom: 15px; }
        .val { color: var(--neon); font-size: 2.2rem; font-weight: bold; display: block; }
        .factor-x-box { background: #1a1a1a; padding: 20px; border-left: 5px solid var(--neon); border-radius: 5px; margin-top: 20px; }
        
        /* Control de Visibilidad */
        #app-dashboard { display: none; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="panel">
        <h2>CONFIGURAR ANÁLISIS</h2>
        <input type="text" id="eqA" placeholder="EQUIPO LOCAL">
        <input type="text" id="eqB" placeholder="EQUIPO VISITANTE">
        <button onclick="activarSistema()">ANALIZAR PARTIDO</button>
    </div>

    <div id="app-dashboard" style="display: contents;">
        <div class="panel">
            <h2>MERCADOS Y STATS</h2>
            <div class="metric-card">BTTS (AMBOS MARCAN)<span class="val" id="btts-val">62%</span></div>
            <div class="metric-card">+2.5 GOLES<span class="val" id="goles-val">58%</span></div>
            <div class="metric-card">CÓRNERS TOTALES<span class="val" id="corners-val">Más de 9.5</span></div>
        </div>

        <div class="panel">
            <h2 id="match-title">MATRIZ DE RIESGO</h2>
            <div class="metric-card">VOLATILIDAD IA<span class="val">45%</span></div>
            <div class="factor-x-box">
                <strong>FACTOR X (TENDENCIA REAL):</strong>
                <p id="factor-text">Esperando datos de entrada...</p>
            </div>
            <h3 style="margin-top:20px; text-align:center;">STAKE SUGERIDO: <span class="val" style="font-size: 1.8rem;">3.0 / 5</span></h3>
        </div>
    </div>
</div>

<script>
    function activarSistema() {
        const a = document.getElementById('eqA').value;
        const b = document.getElementById('eqB').value;
        if(a && b) {
            document.getElementById('app-dashboard').style.display = 'contents';
            document.getElementById('match-title').innerText = a.toUpperCase() + " VS " + b.toUpperCase();
            document.getElementById('factor-text').innerText = "Análisis IA: " + a + " mantiene una intensidad ofensiva superior en condición de local, mientras que " + b + " presenta vulnerabilidad defensiva en el sector izquierdo según los registros de los últimos 10 partidos.";
        } else {
            alert("Completa ambos campos para iniciar el análisis.");
        }
    }
</script>
</body>
</html>
