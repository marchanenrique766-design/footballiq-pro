<!DOCTYPE html>
<html lang="es">
<head>
    <style>
        body { background: #0c0d0e; color: #fff; font-family: sans-serif; padding: 20px; }
        .app { max-width: 500px; margin: auto; background: #161719; border: 1px solid #333; padding: 25px; border-radius: 12px; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 18px; background: #39ff14; color: #000; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; }
        .box { background: #1f2022; padding: 20px; border-left: 5px solid #39ff14; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="app">
        <h2 style="color:#39ff14;">Football IQ PRO</h2>
        <input id="l" placeholder="EQUIPO LOCAL">
        <input id="v" placeholder="EQUIPO VISITANTE">
        <button class="btn" onclick="analizar()">ANALIZAR</button>
        <div id="res" style="display:none; margin-top:20px;">
            <h3 id="mt" style="color:#39ff14;"></h3>
            <div class="box">
                <p id="adn"></p>
            </div>
        </div>
    </div>
    <script>
        function analizar() {
            const l = document.getElementById('l').value.trim();
            const v = document.getElementById('v').value.trim();
            if(!l || !v) return;

            // ESTE ES EL MOTOR: Cambia el mensaje según los equipos
            let analisis = "";
            if (l.toLowerCase() === "barcelona" && v.toLowerCase() === "emelec") {
                analisis = "Barcelona busca dominio posicional, mientras que Emelec prioriza el juego vertical.";
            } else if (l.toLowerCase() === "brasil") {
                analisis = "Brasil presenta un esquema ultra ofensivo. El rival deberá cerrar líneas.";
            } else {
                analisis = l + " y " + v + " plantean un partido de mucha fricción en el medio campo.";
            }

            document.getElementById('mt').innerText = l.toUpperCase() + " VS " + v.toUpperCase();
            document.getElementById('adn').innerText = "🧬 ADN TÁCTICO: " + analisis;
            document.getElementById('res').style.display = 'block';
        }
    </script>
</body>
</html>
