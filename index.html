<script>
    const db = {
        "PSG": { adn: "Alta posesión, bloque alto y presión tras pérdida. Ataque por bandas.", hist: ["V","V","E","V","V"], btts: 62, goles: 58, corners: "Más de 9.5" },
        "ARSENAL": { adn: "Bloque bajo compacto, transiciones directas y juego aéreo defensivo.", hist: ["D","V","E","D","V"], btts: 55, goles: 52, corners: "Más de 8.5" },
        "FLAMENGO": { adn: "Dominio técnico, transiciones rápidas y gran capacidad de remate.", hist: ["V","E","V","V","D"], btts: 70, goles: 65, corners: "Más de 10.5" }
    };

    function ejecutarAnalisis() {
        const inputL = document.getElementById('eqLocal').value;
        const inputV = document.getElementById('eqVis').value;
        
        // Limpiamos los textos
        const l = inputL.trim().toUpperCase();
        const v = inputV.trim().toUpperCase();
        
        console.log("Buscando:", l, "y", v); // ESTO TE AYUDARÁ A VER SI LEE BIEN
        
        if(db[l] && db[v]) {
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('titulo').innerText = l + " VS " + v;
            
            actualizarGrafico('btts-ring', 'btts-val', db[l].btts);
            actualizarGrafico('goles-ring', 'goles-val', db[l].goles);
            document.getElementById('corners-val').innerText = db[l].corners;
            document.getElementById('adn-texto').innerText = db[l].adn;
            
            const hist = document.getElementById('historial');
            hist.innerHTML = db[l].hist.map(r => `<span class="pill" style="background:${r=='V'?'green':r=='E'?'orange':'red'}">${r}</span>`).join('');
        } else {
            // Error detallado
            alert("No encontré '" + l + "' o '" + v + "'. \nDisponibles: PSG, ARSENAL, FLAMENGO");
        }
    }
    // ... resto de la función actualizarGrafico
</script>
