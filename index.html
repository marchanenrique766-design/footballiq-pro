<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Football IQ PRO</title>
</head>
<body>
    <h1>Football IQ PRO</h1>
    <input id="equipo" placeholder="Nombre del equipo">
    <button onclick="buscar()">Buscar Datos</button>
    <div id="res"></div>

    <script>
        async function buscar() {
            const equipo = document.getElementById('equipo').value;
            const API_KEY = "PEGA_AQUÍ_TU_API_KEY"; // <--- PONLA AQUÍ
            const url = `https://api.sportmonks.com/v3/football/teams/search/${equipo}?api_token=${API_KEY}`;
            
            const res = await fetch(url);
            const data = await res.json();
            document.getElementById('res').innerText = JSON.stringify(data);
        }
    </script>
</body>
</html>
