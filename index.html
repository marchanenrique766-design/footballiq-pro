<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOOTBALLIQ PRO</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding-top: 20px; }
        .app { width: 90%; max-width: 400px; }
        .card { background: #121212; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        h3 { color: #00ff88; text-align: center; }
        
        /* El Select que sí funciona */
        select { width: 100%; padding: 15px; margin: 15px 0; background: #1a1a1a; color: #fff; border: 1px solid #444; border-radius: 10px; font-size: 16px; }
        
        button { width: 100%; padding: 18px; background: #00ff88; color: #000; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        #panel { margin-top: 20px; padding: 15px; border-radius: 10px; border: 1px solid #00ff88; display: none; background: #000; }
    </style>
</head>
<body>

<div class="app">
    <div class="card">
        <h3>FOOTBALLIQ PRO</h3>
        
        <select id="partidoSelector">
            <option value="Real Madrid vs Barcelona">La Liga: Real Madrid vs Barcelona</option>
            <option value="Man City vs Liverpool">Premier: Man City vs Liverpool</option>
            <option value="Flamengo vs Coritiba">Brasileirão: Flamengo vs Coritiba</option>
            <option value="Bayern vs Dortmund">Bundesliga: Bayern vs Dortmund</option>
        </select>

        <button type="button" onclick="mostrarAnalisis()">GENERAR ANÁLISIS PRO</button>

        <div id="panel">
            <div id="resultadoContenido" style="color: #fff; font-size: 16px;"></div>
        </div>
    </div>
</div>

<script>
    function mostrarAnalisis() {
        const selector = document.getElementById('partidoSelector');
        const partido = selector.options[selector.selectedIndex].text;
        const panel = document.getElementById('panel');
        const contenido = document.getElementById('resultadoContenido');
        
        contenido.innerHTML = `
            <b style="color:#00ff88">ANÁLISIS: ${partido}</b><br><br>
            ⚽ Goles: Menos 2.5<br>
            🚩 Córneres: Más 7.5<br>
            <b style="color:#ff3333">⚠ RIESGO: ALTO</b><br><br>
            <div style="font-size:20px; color:#00ff88">Confianza: 81%</div>
        `;
        
        panel.style.display = 'block';
    }
</script>

</body>
</html>
