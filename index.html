<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body { background-color: #0c0d0e; color: #fff; font-family: sans-serif; padding: 20px; }
        .app { max-width: 500px; margin: auto; background: #161719; border: 1px solid #333; padding: 20px; border-radius: 12px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: #fff; border-radius: 6px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: #39ff14; color: #000; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; text-transform: uppercase; }
        .box { background: #1f2022; padding: 15px; border-left: 4px solid #39ff14; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="app">
        <h2 style="color:#39ff14;">Football IQ PRO</h2>
        <input id="l" placeholder="EQUIPO LOCAL">
        <input id="v" placeholder="EQUIPO VISITANTE">
        <button class="btn" onclick="gen()">GENERAR</button>
        <div id="res" style="display:none; margin-top:20px;">
            <h3 id="mt" style="color:#39ff14;"></h3>
            <div class="box">
                <p>🧬 <b>ADN TÁCTICO:</b> El análisis de los equipos indica un partido de alta intensidad física y transiciones rápidas.</p>
                <p>🎯 <b>OBJETIVO:</b> Ambos equipos buscan consolidar su posición en la tabla de clasificación.</p>
            </div>
        </div>
    </div>
    <script>
        function gen() {
            const l = document.getElementById('l').value.toUpperCase();
            const v = document.getElementById('v').value.toUpperCase();
            if(!l || !v) return;
            document.getElementById('mt').innerText = l + " VS " + v;
            document.getElementById('res').style.display = 'block';
        }
    </script>
</body>
</html>
