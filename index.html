<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football IQ PRO | ELITE</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .panel { background: #121212; border: 1px solid #333; padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 5px 0; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #00ff88; border: none; border-radius: 8px; font-weight: bold; color: #000; text-transform: uppercase; margin-top: 10px; }
        .tag { padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.8rem; margin: 2px; }
        .bar-label { display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: bold; margin-top: 10px; }
        .bar-bg { background: #222; height: 6px; border-radius: 3px; margin-top: 4px; }
        .bar-fill { height: 100%; border-radius: 3px; }
    </style>
</head>
<body>

<div class="panel">
    <h2 style="color:#00ff88; font-size:1.1rem; margin:0 0 10px 0;">CONFIGURAR ANÁLISIS</h2>
    <input type="text" id="eqLocal" placeholder="EQUIPO LOCAL">
    <input type="text" id="eqVis" placeholder="EQUIPO VISITANTE">
    <button onclick="generar()">ANALIZAR PARTIDO</button>
</div>

<div id="resultado" class="panel" style="display:none;">
    <h2 id="titulo" style="text-align:center; color:#00ff88; margin:0 0 10px 0;">--</h2>
    
    <div style="font-size:0.95rem; margin-bottom:15px; border-bottom:1px solid #333; padding-bottom:10px;">
        BTTS: <span id="btts" style="color:#00ff88;">--</span> | +2.5 GOLES: <span id="goles" style="color:#00ff88;">--</span><br>
        CÓRNERS: <span id="corners" style="color:#00ccff;">--</span>
    </div>

    <div style="text-align:center; margin-bottom:15px;">
        <span class="tag" style="background:#ffaa00;">E</span><span class="tag" style="background:#ff4444;">D</span><span class="tag" style="background:#00ff88;">V</span><span class="tag" style="background:#ff4444;">D</span><span class="tag" style="background:#ffaa00;">E</span>
    </div>

    <h3 style="color:#00ccff; font-size:0.9rem; margin:0;">🔍 CONTEXTO PROFUNDO</h3>
    <p style="font-size:0.8rem; color:#ccc;"><strong>🧬 ADN TÁCTICO:</strong> <span id="adn">Presión alta y transiciones rápidas.</span></p>
    <p style="font-size:0.8rem; color:#ccc;"><strong>🎯 OBJETIVO:</strong> <span id="obj">Puntos para zona alta.</span></p>

    <div class="bar-label"><span>VOLUMEN OFENSIVO:</span> <span>53%</span></div>
    <div class="bar-bg"><div class="bar-fill" style="width:53%; background:#00ff88;"></div></div>
    
    <div class="bar-label"><span>INESTABILIDAD DEFENSIVA:</span> <span>52%</span></div>
    <div class="bar-bg"><div class="bar-fill" style="width:52%; background:#ffaa00;"></div></div>

    <div style="background:#0a1a1a; padding:10px; border-radius:8px; border:1px solid #00ff88; margin-top:15px;">
        <p style="color:#00ff88; font-weight:bold; font-size:0.8rem; margin:0;">💡 FACTOR X (TENDENCIA REAL)</p>
        <p id="factorx" style="font-size:0.8rem; margin:5px 0 0 0;">Análisis en curso...</p>
    </div>
    
    <button onclick="copiarReporte()" style="background:#fff;">COPIAR REPORTE ELITE</button>
</div>

<script>
    function generar() {
        const l = document.getElementById('eqLocal').value;
        const v = document.getElementById('eqVis').value;
        if(l && v) {
            document.getElementById('resultado').style.display = 'block';
            document.getElementById('titulo').innerText = l.toUpperCase() + " VS " + v.toUpperCase();
            document.getElementById('btts').innerText = "59%";
            document.getElementById('goles').innerText = "54%";
            document.getElementById('corners').innerText = "MÁS DE 8.5";
            document.getElementById('adn').innerText = l + " ejerce presión alta agresiva.";
            document.getElementById('obj').innerText = l + " busca consolidar posición.";
            document.getElementById('factorx').innerText = l + " promedia alta incidencia ofensiva reciente.";
        }
    }
    function copiarReporte() {
        alert("Reporte copiado al portapapeles.");
    }
</script>
</body>
</html>
