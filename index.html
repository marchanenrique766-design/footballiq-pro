<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .panel { background: #121212; border: 1px solid #333; padding: 20px; border-radius: 10px; }
        input, button { width: 100%; padding: 15px; margin: 5px 0; background: #222; color: #fff; border: 1px solid #444; }
        button { background: #39ff14; color: #000; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="panel">
        <h2>Football IQ PRO</h2>
        <input id="l" placeholder="LOCAL">
        <input id="v" placeholder="VISITANTE">
        <button onclick="run()">GENERAR ANÁLISIS</button>
        <div id="res" style="margin-top:20px;"></div>
    </div>

    <script>
        function run() {
            const L = document.getElementById('l').value;
            const V = document.getElementById('v').value;
            const div = document.getElementById('res');
            div.innerHTML = `
                <h3 style="color:#39ff14">${L.toUpperCase()} VS ${V.toUpperCase()}</h3>
                <p>⚽ Goles: Más 2.5</p>
                <p>⛳ Córners: Más 9.5</p>
                <p><strong>ADN TÁCTICO:</strong> ${L} busca presión alta, ${V} mantiene bloque medio.</p>
                <p><strong>OBJETIVO:</strong> Puntos vitales para la clasificación.</p>
            `;
        }
    </script>
</body>
</html>
