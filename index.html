<script>
    function generarReporte() {
        const l = document.getElementById('eqL').value.trim().toUpperCase();
        const v = document.getElementById('eqV').value.trim().toUpperCase();
        if(!l || !v) return;

        // --- MOTOR DE ANÁLISIS DINÁMICO ---
        // Generamos un "valor de juego" basado en la longitud del nombre del equipo (para variar el resultado)
        const valorL = l.length;
        const valorV = v.length;
        
        // Lógica de mercado (Simulación inteligente)
        const totalGoles = (valorL + valorV) > 12 ? "Más 2.5 Goles" : "Más 1.5 Goles";
        const corners = (valorL + valorV) % 2 === 0 ? "Más 9.5" : "Más 8.5";
        const tarjetas = (valorL + valorV) > 15 ? "Más 4.5" : "Más 3.5";
        
        // Apartado de Enfrentamientos y Sugerencia
        const sugerencia = (valorL > valorV) ? `Dominio táctico esperado de ${l}.` : `Partido cerrado, se recomienda esperar a los primeros 15 min.`;

        // Actualización de Interfaz
        document.getElementById('resultado').style.display = 'block';
        document.getElementById('tituloMatch').innerText = `${l} vs ${v}`;
        
        // Mostrar resultados
        document.getElementById('valGoles').innerText = totalGoles;
        document.getElementById('valCorners').innerText = corners;
        document.getElementById('valTarjetas').innerText = tarjetas;
        
        // Nuevo apartado de Enfrentamiento
        document.getElementById('mercados').innerHTML += `
            <div style="margin-top:15px; padding:10px; border-left:3px solid #00ff88; background:#111;">
                <strong>📊 Análisis de Enfrentamiento:</strong><br>
                ${sugerencia}
            </div>
        `;
    }
</script>
