<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FootballIQ PRO | Elite</title>
    <style>
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; display: flex; justify-content: center; margin: 0; }
        .app { width: 100%; max-width: 450px; }
        .card { background: #121212; padding: 25px; border-radius: 20px; border: 1px solid #333; }
        h3 { color: #00ff88; text-align: center; margin-bottom: 20px; letter-spacing: 1px; }
        
        input, select { width: 100%; padding: 15px; margin: 8px 0; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 12px; font-size: 15px; box-sizing: border-box; }
        button { width: 100%; padding: 18px; background: linear-gradient(90deg, #004d26, #00ff88); color: black; border: none; border-radius: 12px; font-weight: 900; text-transform: uppercase; margin-top: 15px; cursor: pointer; }
        
        /* Panel de Resultados Pro */
        #panel { margin-top: 25px; display: none; background: #000; padding: 20px; border-radius: 15px; border: 1px solid #00ff88; }
        .res-label { font-size: 14px; color: #aaa; text-transform: uppercase; margin-bottom: 10px; }
        .res-title { font-size: 20px; font-weight: bold; color: #fff; margin-bottom: 10px; }
        .res-data { font-size: 18px; color: #ff9900; margin: 5px 0; }
        .res-risk { color: #ff3333; font-weight: bold; margin: 5px 0; }
        .res-prob { color: #00ff88; font-size: 22px; font-weight: 900; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="app">
        <div class="card">
            <h3>FOOTBALLIQ PRO</h3>
            
            <input type="text" placeholder="Busca Liga...">
            <input type="text" placeholder="Busca Equipo...">
            
            <select id="partido">
                <option value="Real Madrid vs. Barcelona">La Liga: Real Madrid vs. Barcelona</option>
                <option value="Man City vs. Liverpool">Premier: Man City vs. Liverpool</option>
                <option value="Flamengo vs. Coritiba">Brasileirão: Flamengo vs. Coritiba</option>
            </select>

            <button onclick="generar()">GENERAR ANÁLISIS PRO</button>

            <div id="panel">
                <div class="res-label" id="lbl">ANÁLISIS SUMMARY</div>
                <div class="res-title" id="pTitle"></div>
                <div class="res-data">⚽ Goles: Menos 2.5</div>
                <div class="res-data">🚩 Córneres: Más 7.5</div>
                <div class="res-risk">⚠ RIESGO: ALTO</div>
                <div class="res-prob" id="pConf">Confianza: Alta (92%)</div>
            </div>
        </div>
    </div>

    <script>
        function generar() {
            const p = document.getElementById('partido').value;
            document.getElementById('pTitle').innerText = p;
            document.getElementById('panel').style.display = 'block';
        }
    </script>
</body>
</html>
