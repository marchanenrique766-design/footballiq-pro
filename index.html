<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOOTBALLIQ PRO | ENGINE</title>
    <style>
        :root { --neon: #00ff88; --bg: #050505; --panel: #121212; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 15px; }
        .app-container { max-width: 500px; margin: auto; display: flex; flex-direction: column; gap: 20px; }
        .panel { background: var(--panel); border: 1px solid #333; padding: 20px; border-radius: 15px; }
        input { width: 100%; padding: 18px; margin: 10px 0; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 20px; background: var(--neon); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: black; text-transform: uppercase; }
        
        #dashboard { display: none; }
        .metric-box { border: 1px solid #333; padding: 20px; border-radius: 12px; margin-bottom: 15px; background: #1a1a1a; text-align: center; }
        .val { color: var(--neon); font-size: 28px; font-weight: bold; display: block; }
        
        .status-pill { padding: 5px 12px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="panel">
        <h2 style="color:var(--neon);">CONFIGURAR ANÁLISIS</h2>
        <input type="text" id="eqLocal" placeholder="EQUIPO LOCAL (Ej: PSG)">
        <input type="text" id="eqVis" placeholder="EQUIPO VISITANTE (Ej: ARSENAL)">
        <button onclick="analizar()">ANALIZAR PARTIDO</button>
    </div>

    <div id="dashboard">
        <div class="panel">
            <h2 id="titulo-partido">PSG VS ARSENAL</h2>
            <div id="historial-local" style="display:flex; gap:10px; margin-bottom:15px;"></div>
            
            <div class="metric-box">BTTS<span class="val" id="btts">0%</span></div>
            <div class="metric-box">+2.5 GOLES<span class="val" id="goles">0%</span></div>
            
            <div class="metric-box" style="text-align:left;">
                <p style="color:var(--neon); margin:0;">🔍 ADN TÁCTICO:</p>
                <p id="adn-texto" style="font-size:0.9rem;"></p>
            </div>
        </div>
    </div>
</div>

<script>
    // Tu "Cerebro" de datos
    const db = {
        "PSG": { adn: "Alta presión alta y transiciones rápidas.", hist: ["V","V","E","V","V"], btts: 72, goles: 68 },
        "ARSENAL": { adn: "Bloque bajo compacto y contraataque directo.", hist: ["D","V","E","D","V"], btts: 55, goles: 52 },
        "FLAMENGO": { adn: "Posesión activa y bloque alto.", hist: ["V","E","V","V","D"], btts: 65, goles: 60 }
    };

    function analizar() {
        const loc = document.getElementById('eqLocal').value.toUpperCase();
        const vis = document.getElementById('eqVis').value.toUpperCase();
        
        if(db[loc] && db[vis]) {
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('titulo-partido').innerText = loc + " VS " + vis;
            document.getElementById('btts').innerText = db[loc].btts + "%";
            document.getElementById('goles').innerText = db[loc].goles + "%";
            document.getElementById('adn-texto').innerText = db[loc].adn;
            
            // Pintar historial
            const histCont = document.getElementById('historial-local');
            histCont.innerHTML = db[loc].hist.map(r => 
                `<span class="status-pill" style="background:${r=='V'?'green':r=='E'?'orange':'red'}">${r}</span>`
            ).join('');
        } else {
            alert("Equipo no encontrado en la base de datos (Prueba PSG, ARSENAL o FLAMENGO)");
        }
    }
</script>
</body>
</html>
