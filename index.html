<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>FOOTBALLIQ PRO | ELITE DASHBOARD</title>
    <style>
        :root { --neon: #00ff88; --bg: #050505; --panel: #121212; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        
        /* Layout Grid para Dashboard */
        .dashboard-grid { display: grid; grid-template-columns: 350px 1fr 1fr; gap: 20px; max-width: 1400px; margin: auto; }
        .panel { background: var(--panel); border: 1px solid #333; padding: 20px; border-radius: 15px; }
        
        /* Inputs y Botones Pro */
        input { width: 100%; padding: 15px; margin: 10px 0; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--neon); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: black; text-transform: uppercase; }
        
        /* Resultados y Métricas */
        .metric-box { border: 1px solid #333; padding: 20px; border-radius: 10px; margin-bottom: 10px; }
        .value { color: var(--neon); font-size: 28px; font-weight: bold; display: block; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="dashboard-grid">
    <div class="panel">
        <h2>CONFIGURADOR</h2>
        <input type="text" id="eqA" placeholder="EQUIPO LOCAL">
        <input type="text" id="eqB" placeholder="EQUIPO VISITANTE">
        <button onclick="iniciarAnalisis()">EJECUTAR MOTOR IA</button>
    </div>

    <div id="resultadoPanel" class="hidden">
        <div class="panel">
            <h2>MERCADOS CLAVE</h2>
            <div class="metric-box">BTTS PROB: <span class="value">0%</span></div>
            <div class="metric-box">TOTAL GOLES: <span class="value">0.0</span></div>
        </div>
    </div>

    <div id="riesgoPanel" class="hidden">
        <div class="panel">
            <h2>MATRIZ DE RIESGO</h2>
            <div class="metric-box">NIVEL DE VOLATILIDAD: <span class="value">BAJO</span></div>
            <div class="metric-box">FACTOR X: <span class="value">PENDIENTE</span></div>
        </div>
    </div>
</div>

<script>
    function iniciarAnalisis() {
        document.getElementById('resultadoPanel').classList.remove('hidden');
        document.getElementById('riesgoPanel').classList.remove('hidden');
    }
</script>
</body>
</html>
