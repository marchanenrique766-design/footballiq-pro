<!DOCTYPE html>
<html lang="es">
<head>
    <style>
        body { background: #0c0c0c; color: #ffffff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .panel-pro { background: #161616; border: 1px solid #2a2a2a; border-radius: 12px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Ajuste de legibilidad: Blanco brillante para datos clave */
        .data-label { color: #aaaaaa; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        .data-value { color: #ffffff; font-size: 1.4rem; font-weight: 700; margin-bottom: 15px; }
        
        /* Tarjetas de indicadores */
        .metric-card { background: #000; border: 1px solid #333; padding: 15px; border-radius: 8px; margin-top: 10px; }
        
        /* Botón de acción premium */
        .btn-elite { background: linear-gradient(90deg, #00ff88, #00ccff); color: #000; border: none; padding: 18px; width: 100%; border-radius: 6px; font-weight: 800; font-size: 1.1rem; cursor: pointer; }
    </style>
</head>
<body>

<div class="panel-pro">
    <h2 style="color: #00ff88; margin-top: 0;">Football IQ PRO | ELITE DATA</h2>
    
    <input type="text" id="eqL" placeholder="EQUIPO LOCAL" style="width:100%; padding:15px; background:#000; border:1px solid #444; color:#fff; border-radius:6px; margin-bottom:10px;">
    <input type="text" id="eqV" placeholder="EQUIPO VISITANTE" style="width:100%; padding:15px; background:#000; border:1px solid #444; color:#fff; border-radius:6px; margin-bottom:15px;">
    
    <button class="btn-elite" onclick="renderizarReporte()">GENERAR ANÁLISIS DE VALOR</button>

    <div id="pantallaResultados" style="display:none; margin-top:25px;">
        <div class="metric-card">
            <div class="data-label">Pronóstico Sugerido</div>
            <div class="data-value" id="resultadoPronostico" style="color: #00ff88;">--</div>
            
            <div class="data-label">Nivel de Confianza</div>
            <div class="data-value" id="resultadoConfianza">--</div>
            
            <div class="data-label">Contexto Táctico</div>
            <div class="data-value" id="resultadoContexto" style="font-size: 1rem; font-weight: 400; line-height: 1.4;">--</div>
        </div>
    </div>
</div>

<script>
    function renderizarReporte() {
        document.getElementById('pantallaResultados').style.display = 'block';
        // Aquí conectamos con la lógica de cálculo
        document.getElementById('resultadoPronostico').innerText = "MÁS 2.5 GOLES";
        document.getElementById('resultadoConfianza').innerText = "84% (ALTA)";
        document.getElementById('resultadoContexto').innerText = "El historial reciente muestra una alta frecuencia de anotación. La dinámica defensiva del visitante sugiere espacios abiertos.";
    }
</script>
</body>
</html>
