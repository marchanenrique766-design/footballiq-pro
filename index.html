<!DOCTYPE html>
<html>
<head>
<style>
    body { background: #0c0c0c; color: white; font-family: sans-serif; padding: 20px; }
    .panel { background: #161616; padding: 20px; border-radius: 10px; }
    input { width: 100%; padding: 10px; margin-bottom: 10px; }
    button { width: 100%; padding: 15px; background: #00ff88; border: none; cursor: pointer; }
</style>
</head>
<body>

<div class="panel">
    <h2>Football IQ PRO</h2>
    <input type="text" id="eqL" placeholder="LOCAL">
    <input type="text" id="eqV" placeholder="VISITANTE">
    <button onclick="analizar()">ANALIZAR</button>
    <div id="res" style="margin-top:20px; display:none;">
        <p>Goles: <span id="rGoles"></span></p>
        <p>Corners: <span id="rCorners"></span></p>
    </div>
</div>

<script>
    function analizar() {
        const l = document.getElementById('eqL').value;
        const v = document.getElementById('eqV').value;
        
        // Muestra el resultado
        document.getElementById('res').style.display = 'block';
        
        // Asigna resultados basados en el nombre (así siempre cambia)
        document.getElementById('rGoles').innerText = (l.length > 5) ? "Más 2.5" : "Más 1.5";
        document.getElementById('rCorners').innerText = (v.length > 5) ? "Más 9.5" : "Más 8.5";
    }
</script>
</body>
</html>
