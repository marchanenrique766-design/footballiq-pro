<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOOTBALLIQ PRO</title>
    <style>
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .app { width: 100%; max-width: 400px; }
        .card { background: #121212; padding: 25px; border-radius: 20px; border: 1px solid #333; }
        h3 { color: #00ff88; text-align: center; margin-bottom: 25px; }
        
        /* El selector limpio que SÍ funciona */
        select { 
            width: 100%; 
            padding: 16px; 
            margin-bottom: 20px; 
            background: #1a1a1a; 
            color: #fff; 
            border: 1px solid #444; 
            border-radius: 12px; 
            font-size: 16px; 
            -webkit-appearance: none; /* Estilo nativo limpio */
        }
        
        button { width: 100%; padding: 18px; background: #00ff88; color: #000; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; }
        
        #panel { margin-top: 25px; padding: 20px; border-radius: 15px; border: 1px solid #00ff88; display: none; background: #000; }
        .res-text { font-size: 16px; line-height: 1.6; }
    </style>
</head>
<body>

<div class="app">
    <div class="card">
        <h3>FOOTBALLIQ PRO</h3>
        
        <select id="partidoSelector">
            <option value="" disabled selected>Selecciona un partido...</option>
            <option value="Real Madrid vs Barcelona">La Liga: Real Madrid vs Barcelona</option>
            <option value="Man City vs Liverpool">Premier: Man City vs Liverpool</option>
            <option value="Flamengo vs Coritiba">Brasileirão: Flamengo vs Coritiba</option>
            <option value="Bayern vs Dortmund">Bundesliga: Bayern vs Dortmund</option>
            <option value="PSG vs Marseille">Ligue 1: PSG vs Marseille</option>
        </select>

        <button type="button" onclick="mostrar()">GENERAR ANÁLISIS PRO</button>

        <div id="panel">
            <div id="res" class="res-text"></div>
        </div>
    </div>
</div>

<script>
    function mostrar() {
        const sel = document.getElementById('partidoSelector');
        const partido = sel.options[sel.selectedIndex].text;
        if(sel.value === "") return alert("Por favor selecciona un partido");
        
        document.getElementById('panel').style.display = 'block';
        document.getElementById('res').innerHTML = `
            <b style="color:#00ff88">ANÁLISIS: ${partido}</b><br><br>
            ⚽ Goles: Menos 2.5<br>
            🚩 Córneres: Más 7.5<br>
            <b style="color:#ff3333">⚠ RIESGO: ALTO</b><br><br>
            <div style="font-size:22px; color:#00ff88">Confianza: 81%</div>
        `;
    }
</script>

</body>
</html>
