<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football IQ PRO | ANALISTA</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; margin: 0; padding: 15px; }
        .panel { background: #121212; border: 1px solid #333; padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 5px 0; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #00ff88; border: none; border-radius: 8px; font-weight: bold; color: #000; text-transform: uppercase; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="panel">
    <h2 style="color:#00ff88; font-size:1.1rem; margin:0;">CONFIGURAR ANÁLISIS</h2>
    <input type="text" id="eqL" placeholder="EQUIPO LOCAL">
    <input type="text" id="eqV" placeholder="EQUIPO VISITANTE">
    <button onclick="generar()">GENERAR REPORTE IA</button>
</div>

<div id="resultado" class="panel" style="display:none;">
    <h2 id="titulo" style="text-align:center; color:#00ff88; margin:0 0 15px 0;">--</h2>
    
    <h3 style="color:#00ccff; font-size:0.85rem; margin:0 0 10px 0;">🤖 ANÁLISIS TÁCTICO IA</h3>
    <p id="caja-analisis" style="font-size:0.85rem; color:#eee; line-height:1.4; border-left:3px solid #00ccff; padding-left:10px;"></p>
    
    <div style="margin-top:20px; text-align:center;">
        <p style="font-size:0.75rem; color:#888;">Reporte generado automáticamente. No requiere ajustes adicionales.</p>
    </div>
</div>

<script>
    function generar() {
        const l = document.getElementById('eqL').value;
        const v = document.getElementById('eqV').value;
        if(l && v) {
            document.getElementById('resultado').style.display = 'block';
            document.getElementById('titulo').innerText = l.toUpperCase() + " VS " + v.toUpperCase();
            
            // IA narrativa automática
            const analisis = `El enfrentamiento entre <strong>${l}</strong> y <strong>${v}</strong> se define por un claro contraste de estilos. Mientras el local impone un ritmo de presión alta, el visitante se perfila para el contragolpe táctico. Las métricas sugieren una alta probabilidad de goles en ambas porterías (BTTS) y un volumen de córners superior a la media. <strong>Recomendación:</strong> Enfocarse en mercados de goles y saques de esquina.`;
            
            document.getElementById('caja-analisis').innerHTML = analisis;
        }
    }
</script>
</body>
</html>
