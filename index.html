<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>FOOTBALLIQ PRO ELITE</title>
    <style>
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .panel { background: #121212; border: 1px solid #333; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        h2 { color: #00ff88; margin-top: 0; text-transform: uppercase; }
        
        /* Dashboard Grid */
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .stat-card { background: #0a0a0a; padding: 20px; border-radius: 15px; border: 1px solid #00ff88; }
        .stat-val { font-size: 20px; font-weight: bold; color: #00ff88; display: block; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <h2>Football IQ Pro</h2>
        <input type="text" id="eqA" placeholder="LOCAL" style="width:100%; padding:12px; margin-bottom:10px; background:#1a1a1a; border:1px solid #444; color:white; border-radius:8px;">
        <input type="text" id="eqB" placeholder="VISITANTE" style="width:100%; padding:12px; margin-bottom:10px; background:#1a1a1a; border:1px solid #444; color:white; border-radius:8px;">
        <button onclick="activarPoderes()" style="width:100%; padding:15px; background:#00ff88; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">INICIAR ANÁLISIS EXPERTO</button>
    </div>

    <div id="proDashboard" class="dashboard-grid" style="display:none;">
        <div class="stat-card">
            <h3>Matriz de Riesgo</h3>
            <span class="stat-val" style="color: #ff4444;">ALTO RIESGO</span>
            <p style="font-size: 12px; color: #aaa;">Simulación de volatilidad y consistencia táctica en tiempo real.</p>
        </div>
        <div class="stat-card">
            <h3>Indicadores de Mercado</h3>
            <div style="display:flex; justify-content:space-between;">
                <div>BTTS: <span class="stat-val">62%</span></div>
                <div>+2.5 Goles: <span class="stat-val">58%</span></div>
            </div>
        </div>
        <div class="stat-card">
            <h3>Gestión de Banca</h3>
            <div>Stake Sugerido: <span class="stat-val">3.0 / 5</span></div>
        </div>
    </div>
</div>

<script>
    function activarPoderes() {
        document.getElementById('proDashboard').style.display = 'grid';
    }
</script>
</body>
</html>
