<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>FOOTBALLIQ PRO</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; padding: 20px; }
        .panel { background: #121212; border: 1px solid #333; padding: 20px; border-radius: 15px; max-width: 500px; margin: auto; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 5px; }
        button { width: 100%; padding: 15px; background: #00ff88; border: none; cursor: pointer; font-weight: bold; }
        #res { display: none; margin-top: 20px; border-top: 1px solid #333; padding-top: 20px; }
    </style>
</head>
<body>

<div class="panel">
    <h2>CONFIGURAR ANÁLISIS</h2>
    <input type="text" id="eqA" placeholder="LOCAL">
    <input type="text" id="eqB" placeholder="VISITANTE">
    <button onclick="run()">INICIAR ANÁLISIS</button>

    <div id="res">
        <h3 id="tit"></h3>
        <p>BTTS: <b>62%</b></p>
        <p>CÓRNERS: <b>Más de 9.5</b></p>
    </div>
</div>

<script>
    function run() {
        const a = document.getElementById('eqA').value;
        const b = document.getElementById('eqB').value;
        if(a && b) {
            document.getElementById('tit').innerText = a + " VS " + b;
            document.getElementById('res').style.display = 'block';
        }
    }
</script>
</body>
</html>
