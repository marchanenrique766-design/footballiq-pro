<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football IQ PRO | ANALIZADOR MATEMÁTICO</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; margin: 0; padding: 15px; }
        .panel { background: #121212; border: 1px solid #333; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        input { width: 100%; padding: 12px; margin: 5px 0; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #00ff88; border: none; border-radius: 8px; font-weight: bold; color: #000; text-transform: uppercase; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="panel">
    <h2 style="color:#00ff88; font-size:1.1rem; margin-bottom:10px;">DATOS TÉCNICOS</h2>
    <input type="number" id="promGoles" placeholder="Promedio Goles (ej: 2.5)" step="0.1">
    <input type="number" id="promCorners" placeholder="Promedio Córners (ej: 9.5)" step="0.1">
    <button onclick="calcular()">CALCULAR PROBABILIDAD REAL</button>
</div>

<div id="resultado" class="panel" style="display:none;">
    <h2 style="text-align:center; color:#00ff88; font-size:1.2rem;">RESULTADO DEL CÁLCULO</h2>
    <div id="caja-reporte" style="font-size: 0.9rem; color: #eee; line-height: 1.6; border-top: 1px solid #333; padding-top: 10px;"></div>
</div>

<script>
    function calcular() {
        const goles = parseFloat(document.getElementById('promGoles').value);
        const corners = parseFloat(document.getElementById('promCorners').value);
        
        if(!isNaN(goles) && !isNaN(corners)) {
            document.getElementById('resultado').style.display = 'block';
            
            // Lógica de cálculo matemático real (puedes ajustar los factores)
            const probGoles = (goles / 4) * 100;
            const probCorners = (corners / 12) * 100;
            const seguridad = (probGoles + probCorners) / 2;
            
            let consejo = seguridad > 60 ? "ALTA OPORTUNIDAD" : "MERCADO VOLÁTIL (EVITAR)";
            
            document.getElementById('caja-reporte').innerHTML = `
                <p>📊 <strong>Probabilidad Goles:</strong> ${probGoles.toFixed(1)}%</p>
                <p>🚩 <strong>Probabilidad Córners:</strong> ${probCorners.toFixed(1)}%</p>
                <p style="color:#00ff88;">🎯 <strong>ESTADO:</strong> ${consejo}</p>
                <p style="font-size:0.8rem; color:#888;">*Basado en los datos ingresados. No especules si el valor es menor al 50%.</p>
            `;
        } else {
            alert("Por favor, ingresa números válidos.");
        }
    }
</script>
</body>
</html>
