<script>
    async function generarAnalisis() {
        const equipoA = document.getElementById('equipoA').value;
        const equipoB = document.getElementById('equipoB').value;
        const resultadoDiv = document.getElementById('resultado');
        
        // Pon aquí tu token de Sportmonks (asegúrate de que sea válido)
        const API_TOKEN = 'kds5GbRQohzUq9PgBXhQJXzpa2q88Vw89THHRW3A5Nv8gIGG68TJiVSQNUCN'; 

        resultadoDiv.innerHTML = "Analizando datos...";

        try {
            // Ejemplo de búsqueda de equipos (ajusta según lo que necesites mostrar)
            const response = await fetch(`https://api.sportmonks.com/v3/football/teams/search/${equipoA}?api_token=${API_TOKEN}`);
            const data = await response.json();
            
            if (data.data && data.data.length > 0) {
                resultadoDiv.innerHTML = `
                    <p style="color: #39FF14;">Equipo: ${data.data[0].name}</p>
                    <p>Estado: Análisis completado con éxito.</p>
                `;
            } else {
                resultadoDiv.innerHTML = "No se encontraron datos para ese equipo.";
            }
        } catch (error) {
            resultadoDiv.innerHTML = "Error al conectar con el servidor.";
            console.error(error);
        }
    }
</script>
