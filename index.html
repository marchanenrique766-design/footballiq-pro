<script>
    // Estructura de datos centralizada (Fácil de actualizar sin romper el código)
    const baseDatosEquipos = {
        "BARCELONA": { ataque: 8, defensa: 7, tendencia: "Ofensiva" },
        "LIGA": { ataque: 6, defensa: 9, tendencia: "Defensiva" },
        // ... aquí puedes añadir todos los equipos que necesites
    };

    function generarReporte() {
        const l = document.getElementById('eqL').value.trim().toUpperCase();
        const v = document.getElementById('eqV').value.trim().toUpperCase();
        const modo = document.getElementById('modoIA').value;

        // Validación profesional
        if(!l || !v) {
            alert("⚠️ Por favor, ingresa ambos equipos para proceder.");
            return;
        }

        // Simulación de análisis algorítmico profundo
        const equipoL = baseDatosEquipos[l] || { ataque: 5, defensa: 5 };
        const equipoV = baseDatosEquipos[v] || { ataque: 5, defensa: 5 };

        // Cálculo de pronóstico basado en datos
        let probabilidad = (equipoL.ataque > equipoV.defensa) ? 65 : 45;
        let pronostico = (probabilidad > 50) ? "Más 2.5 Goles" : "Menos 2.5 Goles";

        // Construcción del reporte "Elite"
        document.getElementById('resultado').style.display = 'block';
        document.getElementById('titulo').innerText = l + " VS " + v;
        
        // Reporte enriquecido
        document.getElementById('caja-contexto').innerHTML = `
            <strong>Análisis de Forma:</strong> ${l} muestra una tendencia ${equipoL.tendencia}.<br>
            <strong>Factor Estadio:</strong> Alta incidencia en resultados favorables para el local.
        `;
        
        document.getElementById('caja-analisis').innerHTML = `
            <strong>Pronóstico Sugerido:</strong> ${pronostico}<br>
            <strong>Nivel de Confianza:</strong> ${probabilidad}% basado en métricas actuales.
        `;
        
        document.getElementById('stake-profesional').innerText = 
            modo === 'seguridad' ? "STAKE 8/10 (Gestión Conservadora)" : "STAKE 5/10 (Gestión Agresiva)";
    }
</script>
