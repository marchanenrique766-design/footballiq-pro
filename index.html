<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>FOOTBALLIQ PRO ELITE</title>
    <style>
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1000px; margin: auto; }
        .panel { background: #121212; border: 1px solid #333; padding: 20px; border-radius: 15px; }
        h2 { color: #00ff88; text-transform: uppercase; margin-top: 0; }
        /* OCULTAMOS EL PANEL DE RESULTADOS POR DEFECTO */
        #panelResultados { display: none; }
        .val { color: #00ff88; font-weight: bold; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="panel">
        <h2>CONFIGURAR ANÁLISIS</h2>
        <input type="text" id="eqA" placeholder="LOCAL" style="width:100%; padding:10px; margin-bottom:10px; background:#1a1a1a; border:1px solid #444; color:white; border-radius:5px;">
        <input type="text" id="eqB" placeholder="VISITANTE" style="width:100%; padding:10px; margin-bottom:10px; background:#1a1a1a; border:1px solid #444; color:white; border-radius:5px;">
        <button onclick="ejecutarAnalisis()" style="width:100%; padding:15px; background:#00ff88; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">ANALIZAR PARTIDO</button>
    </div>

    <div id="panelResultados" class="panel">
        <h2>RESULTADOS PRO</h2>
        <div id="contenido">
            <p>Volumen Ofensivo: <span class="val">60%</span></p>
            <p>Inestabilidad: <span class="val">45%</span></p>
            <hr style="border:0; border-top:1px solid #333;">
            <p>BTTS: <span class="val">62%</span></p>
            <p>Stake Sugerido: <span class="val">3.0 / 5</span></p>
        </div>
    </div>
</div>

<script>
    function ejecutarAnalisis() {
        const a = document.getElementById('eqA').value;
        const b = document.getElementById('eqB').value;
        
        if (a === "" || b === "") {
            alert("Por favor, ingresa los nombres de ambos equipos.");
        } else {
            // Muestra el panel solo si hay nombres
            document.getElementById('panelResultados').style.display = 'block';
        }
    }
</script>
</body>
</html>
