<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOOTBALLIQ PRO | ELITE DASHBOARD</title>
    <style>
        :root {
            --bg-color: #050505;
            --panel-bg: #121212;
            --border-color: #333;
            --accent-green: #00ff88;
            --text-white: #ffffff;
            --text-gray: #a0a0a0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .dashboard-container {
            display: grid;
            grid-template-columns: 350px 1fr 1fr;
            gap: 20px;
            max-width: 1400px;
            margin: auto;
        }

        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 25px;
            border-radius: 18px;
        }

        h2 {
            color: var(--accent-green);
            text-transform: uppercase;
            font-size: 1.2rem;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background-color: #1a1a1a;
            border: 1px solid #444;
            color: var(--text-white);
            border-radius: 10px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--accent-green);
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            color: #000;
            text-transform: uppercase;
        }

        .metric-card {
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 12px;
            background-color: #1a1a1a;
            text-align: center;
            margin-bottom: 15px;
        }

        .metric-value {
            color: var(--accent-green);
            font-size: 2.2rem;
            font-weight: bold;
            display: block;
        }

        .factor-x-box {
            background: #1a1a1a;
            padding: 20px;
            border-left: 5px solid var(--accent-green);
            border-radius: 5px;
            margin-top: 20px;
        }

        #app-dashboard { display: none; } /* Oculto hasta que presiones analizar */
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="panel">
        <h2>CONFIGURAR ANÁLISIS</h2>
        <input type="text" id="eqA" placeholder="EQUIPO LOCAL">
        <input type="text" id="eqB" placeholder="EQUIPO VISITANTE">
        <button onclick="activarSistema()">ANALIZAR PARTIDO</button>
    </div>

    <div id="app-dashboard" style="display: contents;">
        <div class="panel" id="panel-indicadores">
            <h2>MERCADOS Y STATS</h2>
            <div class="metric-card">BTTS (AMBOS MARCAN)<span class="metric-value" id="btts-val">62%</span></div>
            <div class="metric-card">+2.5 GOLES<span class="metric-value" id="goles-val">58%</span></div>
            <div class="metric-card">CÓRNERS TOTALES<span class="metric-value" id="corners-val">Más de 9.5</span></div>
        </div>

        <div class="panel" id="panel-riesgo">
            <h2 id="match-title">MATRIZ DE RIESGO</h2>
            <div class="metric-card">VOLATILIDAD IA<span class="metric-value">45%</span></div>
            <div class="factor-x-box">
                <strong>FACTOR X (TENDENCIA REAL):</strong>
                <p id="factor-text">Esperando datos de entrada...</p>
            </div>
            <h3 style="margin-top:20px; text-align:center;">STAKE SUGERIDO: <span class="metric-value" style="font-size: 1.8rem;">3.0 / 5</span></h3>
        </div>
    </div>
</div>

<script>
    function activarSistema() {
        const a = document.getElementById('eqA').value;
        const b = document.getElementById('eqB').value;
        
        if (a && b) {
            document.getElementById('app-dashboard').style.display = 'contents';
            document.getElementById('match-title').innerText = a.toUpperCase() + " VS " + b.toUpperCase();
            document.getElementById('factor-text').innerText = "Análisis IA: " + a + " mantiene una intensidad ofensiva superior en condición de local, mientras que " + b + " presenta vulnerabilidad defensiva en el sector izquierdo según los registros de los últimos 10 partidos.";
        } else {
            alert("Por favor, introduce ambos equipos para iniciar el análisis.");
        }
    }
</script>
</body>
</html>
