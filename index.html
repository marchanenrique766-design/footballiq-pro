<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOOTBALLIQ PRO | Elite</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .app { width: 100%; max-width: 400px; }
        .card { background: #121212; padding: 25px; border-radius: 20px; border: 1px solid #00ff88; }
        h3 { color: #00ff88; text-align: center; margin-bottom: 20px; }
        select { width: 100%; padding: 15px; margin: 10px 0; background: #1a1a1a; border: 1px solid #444; color: #fff; border-radius: 12px; }
        button { width: 100%; padding: 18px; background: #00ff88; color: #000; border: none; border-radius: 12px; font-weight: 900; margin-top: 15px; cursor: pointer; }
        #panel { margin-top: 20px; padding: 15px; background: #000; border-left: 4px solid #00ff88; display: none; }
    </style>
</head>
<body>
    <div class="app">
        <div class="card">
            <h3>FOOTBALLIQ PRO</h3>
            
            <select id="liga" onchange="filtrarEquipos()">
                <option value="">Selecciona una Liga...</option>
                <option value="liga1">La Liga</option>
                <option value="liga2">Premier League</option>
            </select>

            <select id="partido">
                <option value="">Selecciona el partido...</option>
            </select>

            <button onclick="generarAnalisis()">GENERAR ANÁLISIS</button>

            <div id="panel">
                <div id="res"></div>
            </div>
        </div>
    </div>

    <script>
        const partidos = {
            "liga1": ["Real Madrid vs Barcelona", "Sevilla vs Betis"],
            "liga2": ["Man City vs Liverpool", "Arsenal vs Man Utd"]
        };

        function filtrarEquipos() {
            const liga = document.getElementById('liga').value;
            const selectPartido = document.getElementById('partido');
            selectPartido.innerHTML = '<option value="">Selecciona el partido...</option>';
            
            if(partidos[liga]) {
                partidos[liga].forEach(p => {
                    let opt = document.createElement('option');
                    opt.value = p; opt.innerHTML = p;
                    selectPartido.appendChild(opt);
                });
            }
        }

        function generarAnalisis() {
            const p = document.getElementById('partido').value;
            if(!p) return alert("Selecciona un partido");
            document.getElementById('panel').style.display = 'block';
            document.getElementById('res').innerHTML = `
                <b style="color:#00ff88">${p.toUpperCase()}</b><br>
                ⚽ Goles: Menos 2.5<br>
                🚩 Confianza: 81%
            `;
        }
    </script>
</body>
</html>
