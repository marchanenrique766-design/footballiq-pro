<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOOTBALLIQ PRO | ANALYTICS</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; margin: 0; padding: 15px; }
        .app-container { max-width: 500px; margin: auto; display: flex; flex-direction: column; gap: 20px; }
        .panel { background: #121212; border: 1px solid #333; padding: 20px; border-radius: 15px; }
        
        input { width: 100%; padding: 18px; margin: 10px 0; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 20px; background: #00ff88; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: black; font-size: 16px; text-transform: uppercase; }
        
        /* Módulos ocultos hasta el análisis */
        #dashboard-completo { display: none; }
        
        .metric-box { border: 1px solid #333; padding: 20px; border-radius: 12px; margin-bottom: 15px; background: #1a1a1a; }
        .val { color: #00ff88; font-size: 28px; font-weight: bold; display: block; margin-top: 5px; }
        
        .factor-x { border-left: 4px solid #00ff88; padding-left: 15px; margin-top: 10px; font-style: italic; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="panel">
        <h2 style="color:#00ff88;">CONFIGURAR ANÁLISIS</h2>
        <input type="text" id="eqA" placeholder="EQUIPO LOCAL">
        <input type="text" id="eqB" placeholder="EQUIPO VISITANTE">
        <button onclick="activarAnalisis()">ANALIZAR PARTIDO</button>
    </div>

    <div id="dashboard-completo">
        <div class="panel">
            <h2 style="color:#00ff88;">RESULTADOS Y RIESGO</h2>
            
            <div class="metric-box">BTTS<span class="val" id="btts">62%</span></div>
            <div class="metric-box">+2.5 GOLES<span class="val" id="goles">58%</span></div>
            <div class="metric-box">VOLATILIDAD IA<span class="val" id="vol">45%</span></div>
            
            <div class="metric-box">
                <strong>FACTOR X (TENDENCIA):</strong>
                <p class="factor-x" id="factor">Procesando profundidad táctica...</p>
            </div>
            
            <div class="metric-box" style="text-align: center;">
                STAKE SUGERIDO: <span class="val" id="stake">3.0 / 5</span>
            </div>
        </div>
    </div>
</div>

<script>
    function activarAnalisis() {
        const a = document.getElementById('eqA').value;
        const b = document.getElementById('eqB').value;
        
        if(a && b) {
            document.getElementById('dashboard-completo').style.display = 'block';
            document.getElementById('factor').innerText = a + " demuestra solidez ofensiva, mientras que " + b + " presenta vulnerabilidades defensivas críticas en los últimos 5 partidos.";
        } else {
            alert("Completa ambos campos para activar la IA.");
        }
    }
</script>
</body>
</html>
