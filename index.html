<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Football IQ PRO | IA ADAPTATIVA</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .panel { background: #121212; border: 1px solid #333; padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 5px 0; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 15px; background: #00ff88; border: none; border-radius: 8px; font-weight: bold; color: #000; text-transform: uppercase; margin-top: 10px; cursor: pointer; }
        .btn-mode { padding: 8px 12px; background: #222; border: 1px solid #444; color: #fff; border-radius: 6px; cursor: pointer; font-size: 0.75rem; }
    </style>
</head>
<body>

<div class="panel">
    <h2 style="color:#00ff88; font-size:1.1rem; margin:0;">CONFIGURAR ANÁLISIS</h2>
    <input type="text" id="eqL" placeholder="EQUIPO LOCAL">
    <input type="text" id="eqV" placeholder="EQUIPO VISITANTE">
    
    <p style="font-size: 0.7rem; color: #888; margin-top:10px;">SELECCIONA EL ENFOQUE DE LA IA:</p>
    <div style="display: flex; gap: 5px;">
        <button class="btn-mode" onclick="setMode('seguridad')">SEGURIDAD</button>
        <button class="btn-mode" onclick="setMode('volumen')">VOLUMEN</button>
        <button class="btn-mode" onclick="setMode('riesgo')">ALTO RIESGO</button>
    </div>
    <input type="hidden" id="modoIA" value="seguridad">
    
    <button class="btn-main" onclick="generarReporte()">GENERAR ANÁLISIS IA</button>
</div>

<div id="resultado" class="panel" style="display:none;">
    <h2 id="titulo" style="text-align:center; color:#00ff88; font-size:1rem;">--</h2>
    <p id="caja-analisis" style="font-size:0.8rem; color:#eee; line-height:1.5; border-left:3px solid #00ccff; padding-left:10px;"></p>
</div>

<script>
    function setMode(m) { document.getElementById('modoIA').value = m; alert("Modo " + m + " activado"); }

    function generarReporte() {
        const l = document.getElementById('eqL').value;
        const v = document.getElementById('eqV').value;
        const modo = document.getElementById('modoIA').value;
        if(!l || !v) return;

        document.getElementById('resultado').style.display = 'block';
        document.getElementById('titulo').innerText = l.toUpperCase() + " VS " + v.toUpperCase();
        
        // IA Dinámica que cambia según el modo seleccionado
        let textoIA = "";
        if (modo === 'seguridad') {
            textoIA = "<strong>Enfoque Seguridad:</strong> Optimizando para minimizar riesgos. La IA recomienda mercados de Doble Oportunidad o -3.5 goles debido a la solidez defensiva observada en " + l + ".";
        } else if (modo === 'volumen') {
            textoIA = "<strong>Enfoque Volumen:</strong> La IA prioriza la estadística de ataque. Se proyecta alta frecuencia de córners y tiros a puerta. Recomendado: +8.5 Córners.";
        } else {
            textoIA = "<strong>Enfoque Alto Riesgo:</strong> La IA busca cuotas de valor. Los datos sugieren una posible sorpresa táctica del visitante. Recomendado: Victoria o empate del no favorito.";
        }
        
        document.getElementById('caja-analisis').innerHTML = textoIA;
    }
</script>
</body>
</html>
