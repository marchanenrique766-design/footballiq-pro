<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>FOOTBALLIQ PRO | ARCHITECT</title>
    <style>
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; display: grid; grid-template-rows: auto 1fr; height: 100vh; gap: 20px; padding: 20px; }
        .grid-main { display: grid; grid-template-columns: 300px 1fr 1fr; gap: 20px; }
        .panel { background: #121212; border: 1px solid #333; padding: 20px; border-radius: 12px; }
        .stat-box { border: 1px solid #333; padding: 15px; border-radius: 8px; text-align: center; }
        .val { color: #00ff88; font-size: 24px; font-weight: bold; display: block; }
        #app-dashboard { display: none; } /* Oculto por defecto */
    </style>
</head>
<body>

<div class="panel">
    <input type="text" id="eqA" placeholder="LOCAL">
    <input type="text" id="eqB" placeholder="VISITANTE">
    <button onclick="bootSystem()">ACTIVAR MOTOR IA</button>
</div>

<div id="app-dashboard" class="grid-main">
    <div class="panel">
        <h2>MATRIZ DE RIESGO</h2>
        <div class="stat-box">Volumen Ofensivo<span class="val">60%</span></div>
    </div>
    <div class="panel">
        <h2>PLAYER PROPS // IA</h2>
        <div class="stat-box">Bukayo Saka<span class="val">75%</span></div>
    </div>
    <div class="panel">
        <h2>TRADING STATS</h2>
        <div class="stat-box">Eficacia<span class="val">0%</span></div>
    </div>
</div>

<script>
    function bootSystem() {
        if(document.getElementById('eqA').value) {
            document.getElementById('app-dashboard').style.display = 'grid';
        }
    }
</script>
</body>
</html>
