<!DOCTYPE html>
<html lang="es">
<head>
    <style>
        body { background: #0c0c0c; color: #ffffff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .panel { background: #161616; border: 1px solid #333; border-radius: 12px; padding: 25px; max-width: 600px; margin: auto; }
        
        /* Inputs mejorados */
        input { width: 100%; padding: 15px; margin-bottom: 10px; background: #000; border: 1px solid #444; color: #ffffff; border-radius: 6px; font-size: 1rem; }
        
        /* Botón estilo premium */
        button { width: 100%; padding: 18px; background: #00ff88; color: #000; border: none; border-radius: 6px; font-weight: 800; cursor: pointer; font-size: 1rem; }
        
        /* Resultados: Blanco y Verde Neón para máximo contraste */
        .market { color: #ffffff; font-size: 1.2rem; margin-bottom: 12px; }
        .market strong { color: #00ff88; }
        
        .sugerencia-box { margin-top: 20px; padding: 15px; border-left: 4px solid #00ff88; background: #1a1a1a; color: #dddddd; font-size: 1rem; line-height: 1.4; }
    </style>
</head>
<body>

<div class="panel">
    <h2 style="color: #00ff88;">Football IQ PRO | ELITE</h2>
    <input type="text" id="eqL" placeholder="EQUIPO LOCAL">
    <input type="text" id="eqV" placeholder="EQUIPO VISITANTE">
    
    <button onclick="generarReporte()">GENERAR ANÁLISIS</button>

    <div id="resultado" style="display:none; margin-top:25px;">
        <h3 id="tituloMatch" style="color: #ffffff; border-bottom: 1px solid #333; padding-bottom: 10px;"></h3>
        <div class="market">⚽ Goles: <strong id="valGoles">--</strong></div>
        <div class="market">⛳ Córners: <strong id="valCorners">--</strong></div>
        <div class="market">🟨 Tarjetas: <strong id="valTarjetas">--</strong></div>
        
        <div class="sugerencia-box">
            <strong>📊 Análisis Táctico:</strong><br>
            <span id="valSugerencia">--</span>
        </div>
    </div>
</div>

<script>
    const db = {
        "BARCELONA": { goles: "Más 2.5", corners: "Más 9.5", tarjetas: "Más 4.5", sug: "Alta intensidad ofensiva, buscar mercados de corners." },
        "EMELEC": { goles: "Más 1.5", corners: "Más 8.5", tarjetas: "Más 3.5", sug: "Partido cerrado, control táctico en medio campo." },
        "AUCAS": { goles: "Más 1.5", corners: "Más 7.5", tarjetas: "Más 2.5", sug: "Tendencia a marcadores ajustados, esperar primeros minutos." }
    };

    function generarReporte() {
        const l = document.getElementById('eqL').value.trim().toUpperCase();
        const v = document.getElementById('eqV').value.trim().toUpperCase();
        if(!l || !v) return;

        const info = db[l] || { goles: "Más 1.5", corners: "Más 8.5", tarjetas: "Más 3.5", sug: "Análisis basado en métricas estándar." };
        
        document.getElementById('resultado').style.display = 'block';
        document.getElementById('tituloMatch').innerText = l + " VS " + v;
        document.getElementById('valGoles').innerText = info.goles;
        document.getElementById('valCorners').innerText = info.corners;
        document.getElementById('valTarjetas').innerText = info.tarjetas;
        document.getElementById('valSugerencia').innerText = info.sug;
    }
</script>
</body>
</html>
