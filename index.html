<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>FOOTBALLIQ PRO ELITE</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        .panel { background: #121212; border: 1px solid #333; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        h2 { color: #00ff88; margin-top: 0; }
        
        /* Dashboard de Indicadores */
        .grid-indicadores { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .indicador { background: #0a0a0a; padding: 20px; border-radius: 15px; border: 1px solid #00ff88; text-align: center; }
        .porcentaje { font-size: 24px; font-weight: bold; color: #00ff88; display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <h2>FOOTBALLIQ PRO</h2>
        <input type="text" id="eqA" placeholder="LOCAL" style="width:100%; padding:10px; margin-bottom:10px; background:#1a1a1a; border:1px solid #444; color:white; border-radius:8px;">
        <input type="text" id="eqB" placeholder="VISITANTE" style="width:100%; padding:10px; margin-bottom:10px; background:#1a1a1a; border:1px solid #444; color:white; border-radius:8px;">
        <button onclick="mostrarPronosticos()" style="width:100%; padding:15px; background:#00ff88; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">INICIAR ANÁLISIS</button>
    </div>

    <div id="panelIndicadores" style="display:none;">
        <h3 style="color:#00ff88;">PANEL DE INDICADORES</h3>
        <div class="grid-indicadores">
            <div class="indicador">BTTS<span class="porcentaje" id="bttsVal">62%</span></div>
            <div class="indicador">+2.5 GOLES<span class="porcentaje" id="golesVal">58%</span></div>
        </div>
        <div class="panel" style="margin-top:15px;">
            <p><strong>CÓRNERS TOTALES:</strong> Más de 9.5 córners</p>
            <p style="font-size:12px; color:#aaa;">Volumen proyectado de tiros de esquina conforme a centros y dinámicas de ataque por las bandas.</p>
        </div>
    </div>
</div>

<script>
    function mostrarPronosticos() {
        document.getElementById('panelIndicadores').style.display = 'block';
    }
</script>
</body>
</html>
