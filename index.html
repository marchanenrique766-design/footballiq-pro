<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #0c0c0c; color: #ffffff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .panel { background: #161616; border: 1px solid #333; border-radius: 12px; padding: 25px; max-width: 600px; margin: auto; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; background: #000; border: 1px solid #444; color: #fff; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 18px; background: #00ff88; color: #000; border: none; border-radius: 6px; font-weight: 800; cursor: pointer; }
        .resultado-box { margin-top: 20px; padding: 15px; border: 1px solid #333; display: none; }
    </style>
</head>
<body>

<div class="panel">
    <h2 style="color: #00ff88;">Football IQ PRO | ELITE</h2>
    <input type="text" id="eqL" placeholder="EQUIPO LOCAL">
    <input type="text" id="eqV" placeholder="EQUIPO VISITANTE">
    <button onclick="generar()">GENERAR ANÁLISIS</button>

    <div id="resultado" class="resultado-box">
        <h3 id="tMatch" style="color: #fff;"></h3>
        <p style="color:#00ff88;">⚽ Goles: <span id="vGoles" style="color:#fff;"></span></p>
        <p style="color:#00ff88;">⛳ Córners: <span id="vCorners" style="color:#fff;"></span></p>
        <p style="color:#00ff88;">🟨 Tarjetas: <span id="vTarjetas" style="color:#fff;"></span></p>
        <hr style="border:0; border-top:1px solid #333;">
        <p style="font-size:0.9rem; color:#ccc;" id="vSugerencia"></p>
    </div>
</div>

<script>
    function generar() {
        const l = document.getElementById('eqL').value;
        const v = document.getElementById('eqV').value;
        if(!l || !v) return;

        // Lógica simple para que siempre funcione
        document.getElementById('resultado').style.display = 'block';
        document.getElementById('tMatch').innerText = l + " vs " + v;
        document.getElementById('vGoles').innerText = (l.length > 5) ? "Más 2.5" : "Más 1.5";
        document.getElementById('vCorners').innerText = (v.length > 5) ? "Más 9.5" : "Más 8.5";
        document.getElementById('vTarjetas').innerText = "Más 3.5";
        document.getElementById('vSugerencia').innerText = "Análisis: Se recomienda observar la posesión inicial de " + l + ".";
    }
</script>
</body>
</html>
