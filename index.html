<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Football IQ PRO | HISTORIAL IA</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .panel { background: #121212; border: 1px solid #333; padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 5px 0; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #00ff88; border: none; border-radius: 8px; font-weight: bold; color: #000; text-transform: uppercase; margin-top: 10px; cursor: pointer; }
        .tag { padding: 3px 7px; border-radius: 4px; font-weight: bold; font-size: 0.75rem; margin: 1px; }
        .btn-mode { padding: 8px; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; cursor: pointer; flex: 1; font-size: 0.7rem; }
    </style>
</head>
<body>

<div class="panel">
    <h2 style="color:#00ff88; font-size:1.1rem; margin:0;">CONFIGURAR ANÁLISIS</h2>
    <input type="text" id="eqL" placeholder="EQUIPO LOCAL">
    <input type="text" id="eqV" placeholder="EQUIPO VISITANTE">
    
    <div style="display: flex; gap: 5px; margin: 10px 0;">
        <button class="btn-mode" onclick="setMode('seguridad')">SEGURIDAD</button>
        <button class="btn-mode" onclick="setMode('volumen')">VOLUMEN</button>
        <button class="btn-mode" onclick="setMode('riesgo')">ALTO RIESGO</button>
    </div>
    <input type="hidden" id="modoIA" value="seguridad">
    <button onclick="generarReporte()">GENERAR REPORTE ELITE</button>
</div>

<div id="resultado" class="panel" style="display:none;">
    <h2 id="titulo" style="text-align:center; color:#00ff88; margin:0 0 10px 0;">--</h2>
    
    <div style="font-size:0.9rem; margin-bottom:10px; text-align:center;">BTTS: 59% | +2.5 GOLES: 54% | CÓRNERS: 8.5</div>

    <div style="text-align:center; margin-bottom:15px;">
        <span class="tag" style="background:#ffaa00;">E</span><span class="tag" style="background:#ff4444;">D</span><span class="tag" style="background:#00ff88;">V</span><span class="tag" style="background:#ff4444;">D</span><span class="tag" style="background:#ffaa00;">E</span>
    </div>

    <h3 style="color:#00ccff; font-size:0.85rem; margin:0;">🔍 CONTEXTO PROFUNDO</h3>
    <p style="font-size:0.8rem; color:#ccc; margin:5px 0;">🧬 <strong>ADN:</strong> Presión alta agresiva.</p>

    <div style="margin: 15px 0; border: 1px solid #00ccff; border-radius: 8px; padding: 10px; background: #0a151a;">
        <h4 style="color:#00ccff; font-size:0.8rem; margin:0 0 8px 0;">🤖 ANÁLISIS HISTÓRICO (H2H 10 PARTIDOS)</h4>
        <p id="caja-analisis" style="font-size:0.75rem; color:#eee; line-height:1.4;"></p>
    </div>

    <div style="margin: 15px 0; padding: 10px; background: #1a1a1a; border-radius: 8px; border: 1px solid #444; text-align: center;">
        <div style="font-size: 0.7rem; color: #888; margin-bottom: 5px;">NIVEL DE SEGURIDAD</div>
        <div style="display: flex; gap: 5px; justify-content: center;">
            <div style="height:10px; width:30%; background:#00ff88; border-radius:5px;"></div>
            <div style="height:10px; width:30%; background:#222; border-radius:5px;"></div>
        </div>
    </div>
    
    <button style="background:#fff;" onclick="alert('Reporte Copiado')">COPIAR REPORTE</button>
</div>

<script>
    function setMode(m) { document.getElementById('modoIA').value = m; alert("Modo " + m + " activado"); }

    function generarReporte() {
        const l = document.getElementById('eqL').value;
        const v = document.getElementById('eqV').value;
        const modo = document.getElementById('modoIA').value;
        if(!l || !v) return;

        document.getElementById('resultado').style.display = 'block';
        document.getElementById('titulo').innerText = l.toUpperCase() + " VS " + v.toUpperCase();
        
        // Análisis que simula revisar los 10 últimos partidos (H2H)
        let analisisIA = `<strong>Análisis H2H:</strong> Tras evaluar los últimos 10 enfrentamientos entre ${l} y ${v}, la IA detecta una clara tendencia: `;
        
        if (modo === 'seguridad') {
            analisisIA += "la mayoría de sus duelos han sido cerrados, con una media inferior a 2.5 goles. Estadísticamente, la tendencia marca un resultado ajustado.";
        } else if (modo === 'volumen') {
            analisisIA += "estos equipos suelen superar los 9 córners por partido en sus cruces directos, con una alta intensidad en las bandas durante el primer tiempo.";
        } else {
            analisisIA += "el historial muestra una alta volatilidad, donde el factor localía se rompe frecuentemente con sorpresas tácticas y tarjetas frecuentes.";
        }
        
        document.getElementById('caja-analisis').innerHTML = analisisIA;
    }
</script>
</body>
</html>
