<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football IQ PRO</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .panel { background: #121212; border: 1px solid #333; padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 5px 0; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #00ff88; border: none; border-radius: 8px; font-weight: bold; color: #000; text-transform: uppercase; margin-top: 10px; }
        .tag { padding: 3px 7px; border-radius: 4px; font-weight: bold; font-size: 0.75rem; margin: 1px; }
        .bar-container { margin: 10px 0; }
        .bar-bg { background: #222; height: 6px; border-radius: 3px; }
        .bar-fill { height: 6px; border-radius: 3px; background: #00ff88; }
    </style>
</head>
<body>

<div class="panel">
    <h2 style="color:#00ff88; font-size:1.1rem; margin:0;">CONFIGURAR ANÁLISIS</h2>
    <input type="text" id="eqLocal" placeholder="LOCAL">
    <input type="text" id="eqVis" placeholder="VISITANTE">
    <button onclick="generar()">ANALIZAR PARTIDO</button>
</div>

<div id="res" class="panel" style="display:none;">
    <h2 id="titulo" style="text-align:center; color:#00ff88; margin:0 0 10px 0;">--</h2>
    
    <div style="font-size:0.9rem; margin-bottom:10px;">
        BTTS: 59% | +2.5 GOLES: 54%<br>
        CÓRNERS: MÁS DE 8.5
    </div>

    <div style="text-align:center; margin-bottom:10px;">
        <span class="tag" style="background:#ffaa00;">E</span><span class="tag" style="background:#ff4444;">D</span><span class="tag" style="background:#00ff88;">V</span><span class="tag" style="background:#ff4444;">D</span><span class="tag" style="background:#ffaa00;">E</span>
    </div>

    <h3 style="color:#00ccff; font-size:0.85rem; margin:0;">🔍 CONTEXTO PROFUNDO</h3>
    <p style="font-size:0.8rem; color:#ccc; margin:5px 0;">🧬 <strong>ADN:</strong> Presión alta agresiva.</p>
    <p style="font-size:0.8rem; color:#ccc; margin:5px 0;">🎯 <strong>OBJETIVO:</strong> Consolidar posición.</p>

    <div class="bar-container">
        <div style="font-size:0.75rem;">OFENSIVA (53%)</div>
        <div class="bar-bg"><div class="bar-fill" style="width:53%;"></div></div>
    </div>

    <div style="background:#0a1a1a; padding:10px; border:1px solid #00ff88; border-radius:8px; margin:10px 0;">
        <p style="color:#00ff88; font-weight:bold; font-size:0.75rem; margin:0;">💡 FACTOR X (TENDENCIA REAL)</p>
        <p style="font-size:0.75rem; margin:5px 0 0 0;">Alta incidencia ofensiva reciente.</p>
    </div>
    
    <button style="background:#fff;">COPIAR REPORTE ELITE</button>
</div>

<script>
    function generar() {
        const l = document.getElementById('eqLocal').value;
        const v = document.getElementById('eqVis').value;
        if(l && v) {
            document.getElementById('res').style.display = 'block';
            document.getElementById('titulo').innerText = l.toUpperCase() + " VS " + v.toUpperCase();
        }
    }
</script>
</body>
</html>
