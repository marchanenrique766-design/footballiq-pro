<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>FOOTBALLIQ PRO | ELITE</title>
    <style>
        :root { --neon: #00ff88; --bg: #050505; --panel: #121212; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 10px; }
        .panel { background: var(--panel); border: 1px solid #333; padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--neon); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: #000; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .ring { transform: rotate(-90deg); }
        .progress { stroke: var(--neon); fill: none; stroke-width: 6; stroke-dasharray: 0, 251; transition: 1s; }
        .pill { padding: 4px 8px; border-radius: 4px; font-weight: bold; margin-right: 5px; }
    </style>
</head>
<body>

<div class="panel">
    <h2 style="color:var(--neon);">CONFIGURADOR</h2>
    <input type="text" id="eqLocal" placeholder="LOCAL">
    <input type="text" id="eqVis" placeholder="VISITANTE">
    <button onclick="analizar()">ANALIZAR PARTIDO</button>
</div>

<div id="dashboard" style="display:none;">
    <div class="panel">
        <h2 id="titulo">PSG VS ARSENAL</h2>
        <div id="historial" style="display:flex; margin-bottom:15px;"></div>
        
        <div class="grid">
            <div class="panel" style="background:#1a1a1a; text-align:center;">BTTS
                <svg width="80" height="80"><circle cx="40" cy="40" r="30" stroke="#333" fill="none" stroke-width="6"/><circle id="btts-ring" class="progress" cx="40" cy="40" r="30"/></svg>
                <div id="btts-val" style="font-weight:bold;">0%</div>
            </div>
            <div class="panel" style="background:#1a1a1a; text-align:center;">+2.5 GOLES
                <svg width="80" height="80"><circle cx="40" cy="40" r="30" stroke="#333" fill="none" stroke-width="6"/><circle id="goles-ring" class="progress" cx="40" cy="40" r="30"/></svg>
                <div id="goles-val" style="font-weight:bold;">0%</div>
            </div>
        </div>

        <div class="panel" style="background:#1a1a1a; margin-top:10px;">
            <p style="color:var(--neon); margin:0;">CÓRNERS</p>
            <h3 id="corners-val" style="margin:5px 0;">--</h3>
        </div>

        <div class="panel" style="background:#000; border-left:4px solid var(--neon);">
            <p style="color:var(--neon); margin:0;">🔍 ADN TÁCTICO:</p>
            <p id="adn-texto" style="font-size:0.9rem;"></p>
        </div>
        
        <button onclick="copiarReporte()" style="background:#fff; margin-top:10px;">Copiar Bloque Elite</button>
    </div>
</div>

<script>
    const db = {
        "PSG": { btts: 62, goles: 58, adn: "Posesión y presión alta.", hist: ["V","V","E","V","V"], corners: "Más de 9.5" },
        "ARSENAL": { btts: 55, goles: 52, adn: "Bloque bajo y transiciones.", hist: ["D","V","E","D","V"], corners: "Más de 8.5" }
    };

    function analizar() {
        const l = document.getElementById('eqLocal').value.trim().toUpperCase();
        const v = document.getElementById('eqVis').value.trim().toUpperCase();
        if(db[l] && db[v]) {
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('titulo').innerText = l + " VS " + v;
            document.getElementById('adn-texto').innerText = `${l} aporta ${db[l].adn} mientras que ${v} responde con ${db[v].adn}`;
            document.getElementById('corners-val').innerText = db[l].corners;
            
            actualizarCirculo('btts-ring', 'btts-val', db[l].btts);
            actualizarCirculo('goles-ring', 'goles-val', db[l].goles);
            
            document.getElementById('historial').innerHTML = db[l].hist.map(r => `<span class="pill" style="background:${r=='V'?'green':'red'}">${r}</span>`).join('');
        }
    }

    function actualizarCirculo(id, valId, p) {
        document.getElementById(id).style.strokeDasharray = (p / 100 * 188) + " 188";
        document.getElementById(valId).innerText = p + "%";
    }

    function copiarReporte() {
        const l = document.getElementById('eqLocal').value;
        const v = document.getElementById('eqVis').value;
        navigator.clipboard.writeText(`⭐ REPORTE ELITE: ${l} vs ${v}\nAnálisis táctico completado.`);
        alert("Reporte copiado al portapapeles");
    }
</script>
</body>
</html>
