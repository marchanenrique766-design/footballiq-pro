<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOOTBALLIQ PRO</title>
    <!-- Estilos forzados para asegurar que no se vea blanco -->
    <style>
        html, body { 
            background-color: #050505 !important; 
            color: #ffffff !important; 
            margin: 0; 
            padding: 20px; 
            font-family: Arial, sans-serif;
        }
        .app-container { 
            background-color: #121212 !important; 
            max-width: 400px; 
            margin: 0 auto; 
            padding: 20px; 
            border-radius: 15px; 
            border: 1px solid #333;
        }
        h1 { color: #00ff88 !important; text-align: center; }
        input { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 15px; 
            background-color: #1a1a1a !important; 
            border: 1px solid #444; 
            color: white !important; 
            border-radius: 8px;
            box-sizing: border-box;
        }
        button { 
            width: 100%; 
            padding: 15px; 
            background-color: #00ff88 !important; 
            color: black !important; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer;
        }
        #res { 
            margin-top: 20px; 
            padding: 15px; 
            border: 1px solid #00ff88; 
            border-radius: 10px; 
            display: none;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h1>FOOTBALLIQ PRO</h1>
    <input type="text" id="eqA" placeholder="EQUIPO A (LOCAL)">
    <input type="text" id="eqB" placeholder="EQUIPO B (VISITANTE)">
    <button onclick="analizar()">INICIAR ANÁLISIS</button>
    
    <div id="res">
        <h2 style="color:#00ff88">ANÁLISIS: PSG VS ARSENAL</h2>
        <p>⚽ Estilo: Bloque alto y transiciones rápidas</p>
        <p style="color:#ff4444">⚠ ALTO RIESGO</p>
    </div>
</div>

<script>
    function analizar() {
        document.getElementById('res').style.display = 'block';
    }
</script>

</body>
</html>
