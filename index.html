<script>
    function generarReporte() {
        const l = document.getElementById('eqL').value.trim().toUpperCase();
        const v = document.getElementById('eqV').value.trim().toUpperCase();
        const modo = document.getElementById('modoIA').value;
        if(!l || !v) return;

        document.getElementById('resultado').style.display = 'block';
        document.getElementById('titulo').innerText = l + " VS " + v;

        // Lógica dinámica avanzada
        let mercado = "";
        let contexto = "";
        let analisis = "";
        let stake = "";

        if (l === "BOCA" || v === "BOCA") {
            contexto = "Presión alta agresiva y consolidación de puntos en tabla.";
            mercado = (modo === 'seguridad') ? "Menos 2.5 Goles" : "Más 1.5 Goles";
            analisis = "Tendencia a resultados cerrados por solidez defensiva histórica.";
        } else if (l === "PSG" || v === "PSG") {
            contexto = "Transición rápida y búsqueda de espacios en profundidad.";
            mercado = (modo === 'seguridad') ? "Más 1.5 Goles" : "Más 8.5 Córners";
            analisis = "Tendencia a juego vertical con alta frecuencia de tiros de esquina.";
        } else {
            contexto = "Partido con alta disputa en mediocampo y posesión dividida.";
            mercado = (modo === 'seguridad') ? "Menos 2.5 Goles" : "Más 1.5 Goles";
            analisis = "Tendencia equilibrada según historial directo reciente.";
        }

        stake = (modo === 'seguridad') ? "STAKE 8/10 (Muy Alta)" : 
                (modo === 'volumen') ? "STAKE 6/10 (Alta)" : "STAKE 3/10 (Moderada)";

        // Actualizamos los campos incluyendo el Pronóstico
        document.getElementById('caja-contexto').innerText = contexto;
        document.getElementById('caja-analisis').innerHTML = "<strong>Pronóstico: " + mercado + "</strong><br>" + analisis;
        document.getElementById('stake-profesional').innerText = stake;
    }
</script>
