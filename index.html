<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        /* Estilos de Alto Contraste para máxima legibilidad */
        body { background: #000; color: #ffffff; font-family: 'Segoe UI', Arial, sans-serif; padding: 20px; }
        .app-container { max-width: 600px; margin: auto; border: 1px solid #333; padding: 25px; border-radius: 8px; background: #0a0a0a; }
        
        /* Botón estilo profesional */
        .btn-gen { width: 100%; padding: 18px; background: #39ff14; color: #000; border: none; border-radius: 4px; font-weight: 900; font-size: 1rem; cursor: pointer; text-transform: uppercase; margin-top: 15px; }
        
        /* Etiquetas de alto contraste */
        .label { color: #39ff14; font-weight: bold; font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase; margin-top: 20px; display: block; }
        
        /* Texto principal blanco brillante */
        .content { color: #ffffff; font-size: 1.05rem; line-height: 1.5; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #444; color: #fff; font-size: 1rem; }
    </style>
</head>
<body>

<div class="app-container">
    <h2 style="color: #fff;">Football IQ PRO | <span style="color:#39ff14;">ANALISTA EXPERTO</span></h2>
    <input id="L" placeholder="EQUIPO LOCAL">
    <input id="V" placeholder="EQUIPO VISITANTE">
    <button class="btn-gen" onclick="generar()">GENERAR ANÁLISIS</button>

    <div id="res" style="display:none; margin-top:30px;">
        <h3 id="match" style="border-bottom: 2px solid #39ff14; padding-bottom: 10px; color:#39ff14;"></h3>
        
        <span class="label">🧬 ADN Táctico</span>
        <div class="content" id="adn"></div>

        <span class="label">🎯 Objetivo</span>
        <div class="content" id="obj"></div>
    </div>
</div>

<script>
    function generar() {
        const L = document.getElementById('L').value.toUpperCase();
        const V = document.getElementById('V').value.toUpperCase();
        if(!L || !V) return;

        document.getElementById('match').innerText = `${L} VS ${V}`;
        document.getElementById('adn').innerText = `${L} ejerce una presión alta agresiva buscando transiciones rápidas, mientras que ${V} se estructura en un bloque medio compacto.`;
        document.getElementById('obj').innerText = `${L} necesita estabilizar su temporada; ${V} busca consolidarse en los puestos de clasificación directa.`;
        
        document.getElementById('res').style.display = 'block';
    }
</script>
</body>
</html>
