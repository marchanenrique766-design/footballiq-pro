<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FootballIQ PRO | Elite Multi-Market</title>
    <style>
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 10px; margin: 0; }
        .app { width: 100%; max-width: 500px; }
        .card { background: #121212; padding: 20px; border-radius: 20px; border: 1px solid #333; }
        h3 { color: #00ff88; text-align: center; margin-bottom: 20px; }
        input { width: 100%; padding: 14px; margin: 8px 0; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 16px; background: linear-gradient(90deg, #004d26, #00ff88); color: black; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        
        /* Panel de Resultados Profesional */
        .panel { margin-top: 20px; padding: 15px; background: #000; border: 1px solid #00ff88; border-radius: 12px; display: none; }
        .row-data { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; font-size: 14px; }
        .row-data b { color: #00ff88; }
        .title-data { font-weight: bold; border-bottom: 2px solid #333; padding-bottom: 5px; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>
    <div class="app">
        <div class="card">
            <h3>PREDICTOR ELITE</h3>
            <input type="text" id="local" placeholder="Equipo Local">
            <input type="text" id="visitante" placeholder="Equipo Visitante">
            <button onclick="generarReporte()">GENERAR REPORTE COMPLETO</button>
            
            <div id="panelResultados" class="panel">
                <span class="title-data" id="tituloReporte"></span>
                <div id="cuerpoReporte"></div>
            </div>
        </div>
    </div>

    <script>
        function generarReporte() {
            const l = document.getElementById('local').value;
            const v = document.getElementById('visitante').value;
            if(!l || !v) return alert("Completa ambos equipos");

            document.getElementById('tituloReporte').innerText = `${l} vs ${v}`;
            
            // Generación de 3 mercados diferentes
            const report = `
                <div class="row-data"><span>Pronóstico Goles:</span> <b>Over 2.5</b></div>
                <div class="row-data"><span>Pronóstico Córneres:</span> <b>Más de 9.5</b></div>
                <div class="row-data"><span>Resultado Técnico:</span> <b>Victoria Local (1X)</b></div>
                <div class="row-data" style="margin-top:10px;"><span>Confianza General:</span> <b style="color:#fff;">89%</b></div>
            `;

            document.getElementById('cuerpoReporte').innerHTML = report;
            document.getElementById('panelResultados').style.display = 'block';
        }
    </script>
</body>
</html>
