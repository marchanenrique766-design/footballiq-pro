<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FootballIQ PRO | Final</title>
    <style>
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; display: flex; justify-content: center; margin: 0; }
        .app { width: 100%; max-width: 450px; }
        .card { background: #121212; padding: 25px; border-radius: 20px; border: 1px solid #333; }
        h3 { color: #00ff88; text-align: center; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 12px; box-sizing: border-box; }
        button { width: 100%; padding: 18px; background: linear-gradient(90deg, #004d26, #00ff88); color: black; border: none; border-radius: 12px; font-weight: 900; text-transform: uppercase; margin-top: 15px; cursor: pointer; }
        
        /* Panel de Resultados con tus colores */
        #panel { margin-top: 25px; display: none; background: #000; padding: 20px; border-radius: 15px; border: 1px solid #00ff88; }
        .res-label { font-size: 13px; color: #aaa; text-transform: uppercase; margin-bottom: 5px; }
        .res-value { font-size: 26px; font-weight: 900; color: #fff; margin-bottom: 15px; }
        .res-prob { color: #00ff88; font-weight: bold; font-size: 20px; }
        .bar-bg { background: #222; height: 12px; border-radius: 6px; margin: 10px 0; overflow: hidden; }
        .bar-fill { background: #00ff88; height: 100%; width: 0%; transition: width 1.5s ease; }
    </style>
</head>
<body>
    <div class="app">
        <div class="card">
            <h3>PREDICTOR ELITE</h3>
            <input type="text" id="nLoc" placeholder="Equipo Local">
            <input type="number" id="gl" placeholder="Goles Esperados Local (Ej: 1.8)">
            <input type="text" id="nVis" placeholder="Equipo Visitante">
            <input type="number" id="gv" placeholder="Goles Esperados Visita (Ej: 0.9)">
            <button onclick="procesar()">GENERAR ANÁLISIS PRO</button>

            <div id="panel">
                <div class="res-label" id="partidoLabel"></div>
                <div class="res-value" id="resultadoTxt"></div>
                <div class="res-prob" id="probTxt"></div>
                <div class="bar-bg"><div id="bar" class="bar-fill"></div></div>
            </div>
        </div>
    </div>

    <script>
        function procesar() {
            const nl = document.getElementById('nLoc').value;
            const nv = document.getElementById('nVis').value;
            const gl = parseFloat(document.getElementById('gl').value);
            const gv = parseFloat(document.getElementById('gv').value);
            if(!gl || !gv) return alert("Ingresa promedios válidos");

            const winProb = Math.min((gl / (gl + gv)) * 100 + 15, 95);
            
            document.getElementById('panel').style.display = 'block';
            document.getElementById('partidoLabel').innerText = `${nl} vs ${nv}`;
            document.getElementById('resultadoTxt').innerText = "Victoria Local (1X)";
            document.getElementById('probTxt').innerText = `Confianza: ${winProb.toFixed(1)}%`;
            document.getElementById('bar').style.width = winProb + "%";
        }
    </script>
</body>
</html>
