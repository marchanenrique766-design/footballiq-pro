<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Football IQ PRO | ELITE</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .panel { background: #121212; border: 1px solid #333; padding: 15px; border-radius: 12px; margin-bottom: 10px; width: 100%; box-sizing: border-box; }
        input { width: 100%; padding: 12px; margin: 5px 0; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #00ff88; border: none; border-radius: 8px; font-weight: bold; color: #000; text-transform: uppercase; margin-top: 10px; cursor: pointer; }
        .btn-mode { padding: 8px; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; cursor: pointer; flex: 1; font-size: 0.7rem; }
    </style>
</head>
<body>

<div class="panel">
    <h2 style="color:#00ff88; font-size:1.1rem; margin:0;">CONFIGURAR ANÁLISIS</h2>
    <input type="text" id="eqL" placeholder="EQUIPO LOCAL">
    <input type="text" id="eqV" placeholder="EQUIPO VISITANTE">
    
    <div style="display: flex; gap: 5px; margin: 10px 0;">
        <button class="btn-mode" onclick="setMode('seguridad')">SEGURIDAD</button>
        <button class="btn-mode" onclick="setMode('volumen')">VOLUMEN</button>
        <button class="btn-mode" onclick="setMode('riesgo')">ALTO RIESGO</button>
    </div>
    <input type="hidden" id="modoIA" value="seguridad">
    <button onclick="generarReporte()">GENERAR REPORTE ELITE</button>
</div>

<div id="resultado" class="panel" style="display:none;">
    <h2 id="titulo" style="text-align:center; color:#00ff88; margin:0 0 10px 0;">--</h2>
    
    <div style="margin: 10px 0; border: 1px solid #00ccff; border-radius: 8px; padding: 12px; background: #0a151a;">
        <h4 style="color:#00ccff; font-size:0.8rem; margin:0 0 8px 0;">🤖 ANÁLISIS HISTÓRICO (H2H)</h4>
        <p id="caja-analisis" style="font-size:0.8rem; color:#eee; line-height:1.4;"></p>
    </div>

    <div style="margin: 10px 0; padding: 12px; background: #1a1a1a; border-radius: 8px; border: 1px solid #00ff88; text-align: center;">
        <p style="margin:0; font-size:0.7rem; color:#888; text-transform:uppercase;">Gestión de Riesgo Profesional</p>
        <p id="stake-profesional" style="margin:5px 0 0 0; color:#00ff88; font-size:1rem; font-weight:bold;"></p>
    </div>
    
    <button style="background:#fff;" onclick="alert('Reporte Copiado')">COPIAR REPORTE ELITE</button>
</div>

<script>
    function setMode(m) { document.getElementById('modoIA').value = m; alert("Modo " + m + " fijado"); }

    function generarReporte() {
        const l = document.getElementById('eqL').value;
        const v = document.getElementById('eqV').value;
        const modo = document.getElementById('modoIA').value;
        if(!l || !v) return;

        document.getElementById('resultado').style.display = 'block';
        document.getElementById('titulo').innerText = l.toUpperCase() + " VS " + v.toUpperCase();
        
        let mercado = (modo === 'seguridad') ? "Menos 2.5 Goles" : (modo === 'volumen') ? "Más 1.5 Goles" : "Menos 3.5 Goles";
        let stake = (modo === 'seguridad') ? "STAKE 8/10 (Muy Alta)" : (modo === 'volumen') ? "STAKE 6/10 (Alta)" : "STAKE 3/10 (Moderada)";
        
        document.getElementById('caja-analisis').innerHTML = `Tendencia histórica H2H detectada: <strong>${mercado}</strong>. Recomendación basada en el comportamiento histórico directo entre ${l} y ${v}.`;
        document.getElementById('stake-profesional').innerText = stake;
    }
</script>
</body>
</html>
