<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Football IQ Pro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div>
        <h1>⚽ Football IQ Pro</h1>
        <p>Análisis profesional de tendencias estadísticas</p>
      </div>
      <span class="badge">Datos demo</span>
    </header>

    <section class="filters">
      <input type="text" id="searchInput" placeholder="Buscar equipo..." />
      <select id="leagueFilter">
        <option value="all">Todas las ligas</option>
        <option value="La Liga">La Liga</option>
        <option value="Premier League">Premier League</option>
        <option value="Champions League">Champions League</option>
      </select>
    </section>

    <main class="layout">
      <section>
        <h2>Partidos disponibles</h2>
        <div id="matches" class="matches"></div>
      </section>

      <section id="analysis" class="analysis"></section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
