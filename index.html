<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Football IQ PRO</title>
<style>
  body { background-color: #0c0d0e; color: #ffffff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
  .container { background: #161719; border: 1px solid #333; padding: 20px; border-radius: 8px; width: 100%; max-width: 400px; }
  input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
  button { width: 100%; padding: 15px; background: #39ff14; color: #000; font-weight: bold; border: none; cursor: pointer; border-radius: 6px; }
</style>
</head>
<body>
<div class="container">
  <h2>FOOTBALL IQ PRO</h2>
  <input type="text" id="local" placeholder="EQUIPO LOCAL">
  <input type="text" id="visit" placeholder="EQUIPO VISITANTE">
  <button onclick="analizar()">GENERAR ANÁLISIS</button>
  <div id="resultado" style="margin-top:20px;"></div>
</div>
<script>
  function analizar() {
    const l = document.getElementById('local').value;
    const v = document.getElementById('visit').value;
    if(l && v) {
      document.getElementById('resultado').innerHTML = 
        `<strong>${l.toUpperCase()} vs ${v.toUpperCase()}</strong><br>
         ADN: Alta Presión<br>BTTS: 75%<br>STAKE: 2 U`;
    }
  }
</script>
</body>
</html>
