<script>
    function generarReporte() {
        const l = document.getElementById('eqL').value.trim();
        const v = document.getElementById('eqV').value.trim();
        const modo = document.getElementById('modoIA').value;
        if(!l || !v) {
            alert("Por favor, ingresa ambos equipos.");
            return;
        }

        // 1. Simulación de métricas (Aquí vive la "inteligencia" del cálculo)
        // Generamos números aleatorios pero controlados para que el análisis sea consistente
        const stats = {
            ataqueL: Math.floor(Math.random() * 5) + 5, // 5 a 10
            defensaL: Math.floor(Math.random() * 5) + 5,
            ataqueV: Math.floor(Math.random() * 5) + 5,
            defensaV: Math.floor(Math.random() * 5) + 5
        };

        // 2. Motor de decisión basado en métricas
        let pronostico = "";
        let contexto = "";
        
        if (stats.ataqueL > stats.defensaV + 1) {
            pronostico = "Más 2.5 Goles";
            contexto = "La presión ofensiva del local supera la estructura defensiva del visitante.";
        } else if (stats.defensaL > 7 && stats.defensaV > 7) {
            pronostico = "Menos 2.5 Goles";
            contexto = "Ambos equipos priorizan el orden táctico y el cierre de espacios.";
        } else {
            pronostico = "BTTS (Ambos Anotan)";
            contexto = "Estadísticamente ambos equipos tienen facilidades para el intercambio de golpes.";
        }

        // 3. Ajuste de Stake según el modo seleccionado
        let stake = "";
        if (modo === 'seguridad') stake = "STAKE 8/10 (Conservador - Alta Probabilidad)";
        else if (modo === 'volumen') stake = "STAKE 6/10 (Volumen - Riesgo Controlado)";
        else stake = "STAKE 3/10 (Riesgo Alto - Alta Rentabilidad)";

        // 4. Actualización Visual
        document.getElementById('resultado').style.display = 'block';
        document.getElementById('titulo').innerText = l.toUpperCase() + " VS " + v.toUpperCase();
        document.getElementById('caja-contexto').innerText = contexto;
        document.getElementById('caja-analisis').innerHTML = "<strong>Pronóstico: " + pronostico + "</strong><br>Análisis calculado mediante algoritmo de rendimiento ofensivo/defensivo.";
        document.getElementById('stake-profesional').innerText = stake;
    }
</script>
