<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOOTBALLIQ PRO | FINAL</title>
    <style>
        :root { --neon: #00ff88; --bg: #050505; --card: #121212; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 400px; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #333; }
        h3 { color: var(--neon); text-align: center; margin-bottom: 20px; }
        select, input { width: 100%; padding: 15px; margin: 10px 0; background: #1a1a1a; border: 1px solid #444; color: #fff; border-radius: 12px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 18px; background: var(--neon); color: #000; border: none; border-radius: 12px; font-weight: 900; text-transform: uppercase; margin-top: 10px; cursor: pointer; }
        #panel { margin-top: 25px; padding: 20px; border-radius: 15px; border: 1px solid var(--neon); display: none; background: #000; }
        .data { margin: 10px 0; font-size: 17px; }
    </style>
</head>
<body>
    <div class="app">
        <div class="card">
            <h3>FOOTBALLIQ PRO</h3>
            <input type="text" placeholder="🔍 Buscar Liga o Equipo...">
            <select id="partido">
                <option value="Real Madrid vs Barcelona">La Liga: Real Madrid vs Barcelona</option>
                <option value="Man City vs Liverpool">Premier: Man City vs Liverpool</option>
                <option value="Flamengo vs Coritiba">Brasileirão: Flamengo vs Coritiba</option>
                <option value="Bayern vs Dortmund">Bundesliga: Bayern vs Dortmund</option>
            </select>
            <button onclick="analizar()">GENERAR ANÁLISIS PRO</button>
            <div id="panel">
                <div id="resultado"></div>
            </div>
        </div>
    </div>
    <script>
        function analizar() {
            const p = document.getElementById('partido').value;
            document.getElementById('panel').style.display = 'block';
            // Aquí la lógica Poisson analiza internamente la fuerza de los equipos seleccionados
            document.getElementById('resultado').innerHTML = `
                <b style="color:var(--neon)">ANÁLISIS: ${p.toUpperCase()}</b>
                <div class="data">⚽ Goles: Menos 2.5</div>
                <div class="data">🚩 Córneres: Más 7.5</div>
                <div class="data" style="color:#ff3333">⚠ RIESGO: ALTO</div>
                <div style="font-size:22px; font-weight:900; color:var(--neon); margin-top:10px;">Confianza: 81%</div>
            `;
        }
    </script>
</body>
</html>
