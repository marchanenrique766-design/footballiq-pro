<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>FootballIQ PRO | Elite Analytics</title>
    <style>
        :root { --main: #00ff88; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 15px; }
        .app { width: 100%; max-width: 400px; }
        .card { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #004d26; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .report { margin-top: 20px; padding: 15px; background: #000; border-left: 4px solid var(--main); display: none; }
        .stat { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="app">
        <div class="card">
            <h3>ANÁLISIS ESTRATÉGICO</h3>
            <input type="text" id="local" placeholder="Equipo Local">
            <input type="text" id="visitante" placeholder="Equipo Visitante">
            <input type="number" id="bankroll" placeholder="Bankroll ($)">
            <button onclick="analizarPro()">EJECUTAR ANÁLISIS</button>
            
            <div id="report" class="report">
                <div id="dataOutput"></div>
            </div>
        </div>
    </div>

    <script>
        function analizarPro() {
            const l = document.getElementById('local').value.toLowerCase();
            const v = document.getElementById('visitante').value.toLowerCase();
            const b = parseFloat(document.getElementById('bankroll').value);
            
            if(!l || !v || !b) return alert("Completa todos los campos");

            // Matriz de pesos (Simulación de IA)
            const getPower = (team) => {
                if(team.includes('psg') || team.includes('real') || team.includes('city')) return 0.90;
                if(team.includes('arsenal') || team.includes('flamenco')) return 0.82;
                return 0.65;
            };

            const powerLocal = getPower(l);
            const powerVisit = getPower(v);
            
            const probBTTS = Math.round(((powerLocal + powerVisit) / 2) * 100);
            const probOver = Math.round((powerLocal * 0.8 + powerVisit * 0.8) * 100);
            const stake = (b * 0.02).toFixed(2);

            document.getElementById('report').style.display = 'block';
            document.getElementById('dataOutput').innerHTML = `
                <div class="stat"><span>BTTS:</span> <b>${probBTTS}%</b></div>
                <div class="stat"><span>Over 2.5:</span> <b>${probOver}%</b></div>
                <div class="stat"><span>Stake (2%):</span> <b>$${stake}</b></div>
            `;
        }
    </script>
</body>
</html>
