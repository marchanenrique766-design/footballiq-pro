<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>FOOTBALLIQ PRO | ELITE DASHBOARD</title>
    <style>
        :root { --neon: #00ff88; --bg: #050505; --panel: #121212; --border: #333; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        
        /* Layout Grid */
        .dashboard { display: grid; grid-template-columns: 350px 1fr 1fr; gap: 20px; max-width: 1400px; margin: auto; }
        .panel { background: var(--panel); border: 1px solid var(--border); padding: 20px; border-radius: 15px; }
        
        /* Controles */
        input { width: 100%; padding: 12px; margin: 10px 0; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--neon); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: black; }
        
        /* Métricas */
        .metric-box { border: 1px solid var(--border); padding: 20px; border-radius: 10px; margin-bottom: 10px; text-align: center; }
        .val { color: var(--neon); font-size: 28px; font-weight: bold; display: block; }
        .factor-x { background: #1a1a1a; padding: 15px; border-left: 4px solid var(--neon); margin-top: 15px; }
        
        #dashboard-content { display: none; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="panel">
        <h2>CONFIGURADOR IA</h2>
        <input type="text" id="eqA" placeholder="EQUIPO LOCAL">
        <input type="text" id="eqB" placeholder="EQUIPO VISITANTE">
        <button onclick="activar()">ACTIVAR MOTOR</button>
    </div>

    <div id="dashboard-content" class="dashboard" style="display:contents;">
        <div class="panel">
            <h2>INDICADORES MERCADO</h2>
            <div class="metric-box">BTTS<span class="val" id="btts">62%</span></div>
            <div class="metric-box">+2.5 GOLES<span class="val" id="goles">58%</span></div>
            <div class="metric-box">CÓRNERS<span class="val" id="corners">9.5</span></div>
        </div>

        <div class="panel">
            <h2>MATRIZ DE RIESGO</h2>
            <div class="metric-box">VOLATILIDAD<span class="val" id="vol">45%</span></div>
            <div class="factor-x">
                <strong>FACTOR X:</strong>
                <p id="factorText">Procesando tendencia táctica avanzada...</p>
            </div>
            <h3 style="text-align:center; margin-top:20px;">STAKE: <span class="val" id="stake">3.0</span></h3>
        </div>
    </div>
</div>

<script>
    function activar() {
        const a = document.getElementById('eqA').value;
        const b = document.getElementById('eqB').value;
        if(a && b) {
            document.getElementById('dashboard-content').style.display = 'contents';
            document.getElementById('factorText').innerText = a + " y " + b + " han mostrado una alta correlación en sus últimos enfrentamientos directos, optimizando la señal de trading.";
        }
    }
</script>
</body>
</html>
