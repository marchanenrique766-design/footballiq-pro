<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Poisson Engine PRO</title>
    <style>
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 400px; }
        .card { background: #121212; padding: 25px; border-radius: 20px; border: 1px solid #333; }
        input { width: 100%; padding: 15px; margin: 8px 0; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 16px; background: #00ff88; color: #000; border: none; border-radius: 10px; font-weight: 900; margin-top: 15px; cursor: pointer; }
        .res-card { background: #000; padding: 15px; margin-top: 20px; border-radius: 12px; border: 1px solid #00ff88; }
    </style>
</head>
<body>
    <div class="app">
        <div class="card">
            <h3 style="color:#00ff88; text-align:center;">MOTOR POISSON V11</h3>
            <input type="number" id="gl" placeholder="Goles esperados Local (Ej: 1.8)">
            <input type="number" id="gv" placeholder="Goles esperados Visita (Ej: 0.9)">
            <button onclick="calcularReal()">EJECUTAR CÁLCULO</button>

            <div id="panel" class="res-card" style="display:none;"></div>
        </div>
    </div>

    <script>
        function calcularReal() {
            const gl = parseFloat(document.getElementById('gl').value);
            const gv = parseFloat(document.getElementById('gv').value);
            if(!gl || !gv) return alert("Ingresa valores reales");

            // Fórmula de Poisson simplificada para probabilidad de victoria
            // P(Victoria) = (gl^n * e^-gl) / n!
            const winProb = (1 - Math.exp(-(gl - gv))) * 50 + 50; 
            const bttsProb = (1 - Math.exp(-gl * gv)) * 100;
            
            document.getElementById('panel').style.display = 'block';
            document.getElementById('panel').innerHTML = `
                <div style="font-size:14px; color:#aaa;">Probabilidad Victoria Local</div>
                <div style="font-size:24px; font-weight:bold; color:#00ff88;">${Math.min(winProb, 95).toFixed(1)}%</div>
                <div style="margin-top:10px; font-size:14px; color:#aaa;">Probabilidad Ambos Anotan (BTTS)</div>
                <div style="font-size:24px; font-weight:bold;">${Math.min(bttsProb, 90).toFixed(1)}%</div>
            `;
        }
    </script>
</body>
</html>
