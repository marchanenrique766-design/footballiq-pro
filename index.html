<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOOTBALLIQ PRO | ELITE</title>
    <style>
        :root { --neon: #00ff88; --bg: #050505; --panel: #121212; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 15px; }
        .app-container { max-width: 500px; margin: auto; display: flex; flex-direction: column; gap: 20px; }
        .panel { background: var(--panel); border: 1px solid #333; padding: 20px; border-radius: 15px; }
        
        input { width: 100%; padding: 18px; margin: 10px 0; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 20px; background: var(--neon); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: black; text-transform: uppercase; }
        
        /* Gráficos de Anillo */
        .ring-container { position: relative; width: 100px; height: 100px; margin: 10px auto; }
        .ring { transform: rotate(-90deg); }
        .ring-bg { fill: none; stroke: #222; stroke-width: 8; }
        .ring-progress { fill: none; stroke: var(--neon); stroke-width: 8; stroke-dasharray: 0, 251; transition: 1s ease-out; }
        .val-text { position: absolute; top: 35px; left: 0; width: 100%; text-align: center; font-weight: bold; font-size: 1.2rem; }
        
        #dashboard-completo { display: none; }
        .metric-box { border: 1px solid #333; padding: 20px; border-radius: 12px; margin-bottom: 15px; background: #1a1a1a; text-align: center; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="panel">
        <h2 style="color:var(--neon);">CONFIGURAR ANÁLISIS</h2>
        <input type="text" id="eqA" placeholder="EQUIPO LOCAL">
        <input type="text" id="eqB" placeholder="EQUIPO VISITANTE">
        <button onclick="activarAnalisis()">ANALIZAR PARTIDO</button>
    </div>

    <div id="dashboard-completo">
        <div class="panel">
            <h2 id="titulo">RESULTADOS Y RIESGO</h2>
            
            <div class="metric-box">
                BTTS (AMBOS MARCAN)
                <div class="ring-container">
                    <svg class="ring" width="100" height="100">
                        <circle class="ring-bg" cx="50" cy="50" r="40"></circle>
                        <circle class="ring-progress" id="btts-ring" cx="50" cy="50" r="40"></circle>
                    </svg>
                    <div class="val-text" id="btts-val">0%</div>
                </div>
            </div>

            <div class="metric-box">
                +2.5 GOLES TOTALES
                <div class="ring-container">
                    <svg class="ring" width="100" height="100">
                        <circle class="ring-bg" cx="50" cy="50" r="40"></circle>
                        <circle class="ring-progress" id="goles-ring" cx="50" cy="50" r="40"></circle>
                    </svg>
                    <div class="val-text" id="goles-val">0%</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function activarAnalisis() {
        const a = document.getElementById('eqA').value;
        const b = document.getElementById('eqB').value;
        if(a && b) {
            document.getElementById('dashboard-completo').style.display = 'block';
            // Simulación de valores (62% y 58%)
            actualizarAnillo('btts-ring', 'btts-val', 62);
            actualizarAnillo('goles-ring', 'goles-val', 58);
        }
    }

    function actualizarAnillo(ringId, textId, porcentaje) {
        const ring = document.getElementById(ringId);
        const text = document.getElementById(textId);
        const radio = 40;
        const circunferencia = 2 * Math.PI * radio;
        const offset = circunferencia - (porcentaje / 100 * circunferencia);
        ring.style.strokeDasharray = `${(porcentaje / 100 * circunferencia)} ${circunferencia}`;
        text.innerText = porcentaje + "%";
    }
</script>
</body>
</html>
