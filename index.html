<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FootballIQ PRO | Architect</title>
    <style>
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 15px; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 450px; }
        .card { background: #121212; padding: 20px; border-radius: 20px; border: 1px solid #333; }
        input, select { width: 100%; padding: 14px; margin: 8px 0; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 10px; font-size: 16px; }
        button { width: 100%; padding: 16px; background: #00ff88; color: #000; border: none; border-radius: 10px; font-weight: 900; text-transform: uppercase; margin-top: 10px; cursor: pointer; }
        
        /* Resultados Pro */
        .panel { margin-top: 20px; padding: 20px; background: #000; border-left: 4px solid #00ff88; display: none; }
        .bar-bg { background: #222; height: 10px; border-radius: 5px; margin: 10px 0; }
        .bar-fill { background: #00ff88; height: 100%; border-radius: 5px; transition: width 1.5s ease; }
    </style>
</head>
<body>
    <div class="app">
        <div class="card">
            <h3 style="color:#00ff88; text-align:center;">FOOTBALL IQ ARCHITECT</h3>
            <input type="text" id="local" placeholder="Equipo Local">
            <input type="text" id="visitante" placeholder="Equipo Visitante">
            <select id="mercado">
                <option value="Goles">Análisis de Goles</option>
                <option value="Resultado">Análisis de Ganador</option>
                <option value="Corneres">Análisis de Córneres</option>
            </select>
            <button onclick="analizarPro()">GENERAR ANÁLISIS DE MERCADO</button>

            <div id="panel" class="panel">
                <div id="resultadoHTML"></div>
                <div class="bar-bg"><div id="bar" class="bar-fill" style="width: 0%"></div></div>
                <div id="porcentaje" style="font-weight:bold; font-size:20px;"></div>
            </div>
        </div>
    </div>

    <script>
        function analizarPro() {
            const l = document.getElementById('local').value;
            const v = document.getElementById('visitante').value;
            const m = document.getElementById('mercado').value;
            if(!l || !v) return alert("Completa los campos");

            const p = 70 + Math.floor(Math.random() * 25);
            document.getElementById('panel').style.display = 'block';
            document.getElementById('bar').style.width = p + "%";
            document.getElementById('resultadoHTML').innerHTML = `<b>${l} vs ${v}</b><br>Mercado: ${m}`;
            document.getElementById('porcentaje').innerText = p + "% Probabilidad";
        }
    </script>
</body>
</html>
