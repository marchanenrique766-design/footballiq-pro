<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOOTBALLIQ PRO</title>
    <style>
        body { background: #050505; color: #fff; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 20px; }
        .app-container { max-width: 600px; margin: auto; display: flex; flex-direction: column; gap: 25px; }
        
        h2 { color: #00ff88; font-size: 1.5rem; text-transform: uppercase; margin-bottom: 15px; }
        
        .panel { background: #121212; border: 1px solid #333; padding: 25px; border-radius: 20px; }
        
        input { width: 100%; padding: 20px; margin: 10px 0; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 12px; font-size: 1.1rem; box-sizing: border-box; }
        
        button { width: 100%; padding: 22px; background: #00ff88; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: #000; text-transform: uppercase; font-size: 1.1rem; margin-top: 10px; }
        
        #dashboard { display: none; }
        .stat-box { font-size: 1.3rem; margin: 15px 0; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .stat-value { color: #00ff88; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="panel">
        <h2>CONFIGURADOR</h2>
        <input type="text" id="eqLocal" placeholder="LOCAL">
        <input type="text" id="eqVis" placeholder="VISITANTE">
        <button onclick="analizar()">ANALIZAR PARTIDO</button>
    </div>

    <div id="dashboard" class="panel">
        <h2 id="titulo" style="font-size: 1.8rem;">--</h2>
        <div class="stat-box">BTTS: <span class="stat-value" id="btts-res">--</span></div>
        <div class="stat-box">+2.5 GOLES: <span class="stat-value" id="goles-res">--</span></div>
        <div class="stat-box">CÓRNERS: <span class="stat-value" id="corners-res">--</span></div>
        
        <div style="background:#000; padding:20px; border-radius:15px; border-left:5px solid #00ff88;">
            <p style="color:#00ff88; margin:0 0 10px 0; font-weight:bold;">🔍 ANÁLISIS TÁCTICO</p>
            <p id="analisis-profundo" style="line-height: 1.6;"></p>
        </div>
    </div>
</div>

<script>
    function analizar() {
        const l = document.getElementById('eqLocal').value.toUpperCase();
        const v = document.getElementById('eqVis').value.toUpperCase();
        
        if(!l || !v) return;

        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('titulo').innerText = l + " VS " + v;
        document.getElementById('btts-res').innerText = Math.floor(Math.random() * 30 + 40) + "%";
        document.getElementById('goles-res').innerText = Math.floor(Math.random() * 30 + 40) + "%";
        document.getElementById('corners-res').innerText = "MÁS DE 8.5";
        document.getElementById('analisis-profundo').innerText = `El enfrentamiento entre ${l} y ${v} presenta una alta intensidad táctica. Se sugiere enfoque en mercado de goles debido al historial reciente.`;
    }
</script>
</body>
</html>
