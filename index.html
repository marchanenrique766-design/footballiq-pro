<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOOTBALLIQ PRO | FINAL</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .panel { background: #121212; border: 1px solid #333; padding: 15px; border-radius: 15px; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 5px 0; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #00ff88; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: #000; text-transform: uppercase; }
        
        .bar-container { margin: 12px 0; }
        .bar-label { display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: bold; }
        .bar-bg { background: #222; height: 6px; border-radius: 3px; margin-top: 4px; }
        .bar-fill { height: 100%; border-radius: 3px; }
    </style>
</head>
<body>

<div class="panel">
    <h2 style="color:#00ff88; margin:0 0 10px 0; font-size:1.2rem;">CONFIGURAR ANÁLISIS</h2>
    <input type="text" id="eqLocal" placeholder="LOCAL">
    <input type="text" id="eqVis" placeholder="VISITANTE">
    <button onclick="analizar()">ANALIZAR PARTIDO</button>
</div>

<div id="dashboard" class="panel" style="display:none;">
    <h2 id="titulo" style="margin:0 0 10px 0;">--</h2>
    
    <div style="font-size:1.1rem; color:#00ff88; margin-bottom:10px;">
        BTTS: <span id="btts">--</span> | +2.5 GOLES: <span id="goles">--</span>
    </div>

    <!-- BARRAS DE PROGRESO -->
    <div class="bar-container">
        <div class="bar-label"><span>VOLUMEN OFENSIVO:</span> <span id="val-of">53%</span></div>
        <div class="bar-bg"><div id="bar-of" class="bar-fill" style="width:53%; background:#00ff88;"></div></div>
    </div>
    <div class="bar-container">
        <div class="bar-label"><span>INESTABILIDAD DEFENSIVA:</span> <span id="val-de">52%</span></div>
        <div class="bar-bg"><div id="bar-de" class="bar-fill" style="width:52%; background:#ffaa00;"></div></div>
    </div>
    <div class="bar-container">
        <div class="bar-label"><span>FILTRO CONSISTENCIA IA:</span> <span id="val-ia">75%</span></div>
        <div class="bar-bg"><div id="bar-ia" class="bar-fill" style="width:75%; background:#00ccff;"></div></div>
    </div>

    <div style="background:#000; padding:10px; border-radius:8px; border:1px solid #00ff88; margin-top:15px;">
        <p style="color:#00ff88; font-weight:bold; margin:0; font-size:0.9rem;">💡 FACTOR X (TENDENCIA REAL)</p>
        <p id="factor-x" style="font-size:0.8rem; margin:5px 0 0 0;"></p>
    </div>
</div>

<script>
    function analizar() {
        const l = document.getElementById('eqLocal').value.toUpperCase();
        const v = document.getElementById('eqVis').value.toUpperCase();
        if(!l || !v) return;

        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('titulo').innerText = l + " VS " + v;
        document.getElementById('btts').innerText = "59%";
        document.getElementById('goles').innerText = "54%";
        document.getElementById('factor-x').innerText = `${l} ha mostrado una tendencia ofensiva agresiva en sus últimos 3 partidos, superando la media de corners.`;
    }
</script>
</body>
</html>
