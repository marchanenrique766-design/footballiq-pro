<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOOTBALLIQ PRO | ANALYTICS</title>
    <style>
        :root { --neon: #00ff88; --bg: #050505; --panel: #121212; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; padding: 15px; margin: 0; }
        .app-container { max-width: 500px; margin: auto; display: flex; flex-direction: column; gap: 20px; }
        .panel { background: var(--panel); border: 1px solid #333; padding: 20px; border-radius: 15px; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--neon); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: black; text-transform: uppercase; }
        
        #dashboard { display: none; }
        .val { color: var(--neon); font-size: 24px; font-weight: bold; }
        .pill { padding: 4px 10px; border-radius: 4px; font-weight: bold; margin-right: 5px; color: #fff; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="panel">
        <h2 style="color:var(--neon);">CONFIGURAR ANÁLISIS</h2>
        <input type="text" id="eqLocal" placeholder="EQUIPO LOCAL">
        <input type="text" id="eqVis" placeholder="EQUIPO VISITANTE">
        <button onclick="ejecutarAnalisis()">ANALIZAR PARTIDO</button>
    </div>

    <div id="dashboard">
        <div class="panel">
            <h2 id="titulo" style="margin-top:0;">...</h2>
            <div id="historial" style="display:flex; margin-bottom:15px;"></div>
            
            <div class="panel" style="background:#1a1a1a; margin-bottom:15px;">
                BTTS: <span class="val" id="res-btts">0%</span><br>
                +2.5 GOLES: <span class="val" id="res-goles">0%</span>
            </div>
            
            <div class="panel" style="background:#000; border-left:4px solid var(--neon);">
                <p style="color:var(--neon); margin:0;">🔍 ANÁLISIS TÁCTICO:</p>
                <p id="adn-texto" style="font-size:0.9rem; margin-top:5px;"></p>
            </div>
        </div>
    </div>
</div>

<script>
    const db = {
        "PSG": { btts: 62, goles: 58, adn: "Alta posesión y presión alta.", hist: ["V","V","E","V","V"] },
        "ARSENAL": { btts: 55, goles: 52, adn: "Bloque bajo y transiciones directas.", hist: ["D","V","E","D","V"] },
        "FLAMENGO": { btts: 70, goles: 65, adn: "Dominio técnico y ataque veloz.", hist: ["V","E","V","V","D"] }
    };

    function ejecutarAnalisis() {
        const l = document.getElementById('eqLocal').value.trim().toUpperCase();
        const v = document.getElementById('eqVis').value.trim().toUpperCase();
        
        if(db[l] && db[v]) {
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('titulo').innerText = l + " VS " + v;
            
            // Lógica Comparativa: Ajustamos los resultados según la sinergia
            let bttsFinal = Math.round((db[l].btts + db[v].btts) / 2);
            let golesFinal = Math.round((db[l].goles + db[v].goles) / 2);
            
            document.getElementById('res-btts').innerText = bttsFinal + "%";
            document.getElementById('res-goles').innerText = golesFinal + "%";
            document.getElementById('adn-texto').innerText = l + " aporta " + db[l].adn + " mientras que " + v + " responde con " + db[v].adn;
            
            const hist = document.getElementById('historial');
            hist.innerHTML = db[l].hist.map(r => `<span class="pill" style="background:${r=='V'?'green':r=='E'?'orange':'red'}">${r}</span>`).join('');
        } else {
            alert("Equipos disponibles: PSG, ARSENAL, FLAMENGO");
        }
    }
</script>
</body>
</html>
