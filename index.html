<script>
    // 1. BASE DE DATOS DE EQUIPOS (Aquí añades tus equipos reales)
    const baseDatos = {
        "BARCELONA": { goles: "Más 2.5", corners: "Más 9.5", tarjetas: "Más 4.5", tactica: "Ataque constante por bandas." },
        "EMELEC": { goles: "Más 1.5", corners: "Más 8.5", tarjetas: "Más 3.5", tactica: "Bloque defensivo y contraataque rápido." },
        "AUCAS": { goles: "Menos 2.5", corners: "Más 7.5", tarjetas: "Más 2.5", tactica: "Partido cerrado, control de posesión." }
    };

    function generarAnalisis() {
        const l = document.getElementById('eqL').value.trim().toUpperCase();
        const v = document.getElementById('eqV').value.trim().toUpperCase();
        if(!l || !v) return;

        // 2. LÓGICA DE BÚSQUEDA
        // Si los equipos están en la base, usa sus datos. Si no, genera un análisis estándar.
        const statsL = baseDatos[l] || { goles: "Más 1.5", corners: "Más 8.5", tarjetas: "Más 3.5", tactica: "Partido equilibrado por falta de historial." };
        const statsV = baseDatos[v] || { goles: "Más 1.5", corners: "Más 8.5", tarjetas: "Más 3.5", tactica: "Duelo de intensidad media." };

        // 3. ACTUALIZACIÓN (Combinamos los datos de los dos equipos)
        document.getElementById('resultado').style.display = 'block';
        document.getElementById('tMatch').innerText = l + " vs " + v;
        
        document.getElementById('vGoles').innerText = statsL.goles; // Usa el dato del local
        document.getElementById('vCorners').innerText = statsV.corners; // Usa el dato del visitante
        document.getElementById('vTarjetas').innerText = statsL.tarjetas; 
        document.getElementById('vSugerencia').innerText = "Análisis: " + statsL.tactica + " vs " + statsV.tactica;
    }
</script>
