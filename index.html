<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>FOOTBALLIQ PRO | ENGINE</title>
    <style>
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .grid-master { display: grid; grid-template-columns: 350px 1fr; gap: 20px; max-width: 1100px; margin: auto; }
        .panel { background: #121212; border: 1px solid #333; padding: 20px; border-radius: 12px; }
        .stat-card { background: #1a1a1a; padding: 15px; border-radius: 8px; border-left: 4px solid #00ff88; margin-bottom: 10px; }
        .val { color: #00ff88; font-size: 20px; font-weight: bold; }
        #resultados { display: none; }
    </style>
</head>
<body>

<div class="grid-master">
    <div class="panel">
        <h2 style="color:#00ff88;">CONFIGURAR ANÁLISIS</h2>
        <input type="text" id="l" placeholder="EQUIPO LOCAL" style="width:100%; padding:10px; background:#222; border:1px solid #444; color:#fff; border-radius:5px;">
        <input type="text" id="v" placeholder="EQUIPO VISITANTE" style="width:100%; padding:10px; margin-top:10px; background:#222; border:1px solid #444; color:#fff; border-radius:5px;">
        <button onclick="analizar()" style="width:100%; padding:15px; margin-top:10px; background:#00ff88; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">EJECUTAR ALGORITMO IA</button>
    </div>

    <div id="resultados" class="panel">
        <h2 id="matchTitle" style="color:#00ff88;"></h2>
        <div class="stat-card">BTTS (AMBOS MARCAN): <span class="val" id="btts">0%</span></div>
        <div class="stat-card">+2.5 GOLES: <span class="val" id="goles">0%</span></div>
        <div class="stat-card">CÓRNERS TOTALES: <span class="val" id="corners">0</span></div>
    </div>
</div>

<script>
    function analizar() {
        const l = document.getElementById('l').value;
        const v = document.getElementById('v').value;
        
        if(l && v) {
            // Lógica de simulación del algoritmo que sacamos de las ideas de estudio
            document.getElementById('matchTitle').innerText = l.toUpperCase() + " VS " + v.toUpperCase();
            document.getElementById('btts').innerText = Math.floor(Math.random() * (90 - 55) + 55) + "%";
            document.getElementById('goles').innerText = Math.floor(Math.random() * (85 - 50) + 50) + "%";
            document.getElementById('corners').innerText = "Más de " + (Math.floor(Math.random() * (11 - 8) + 8)) + ".5";
            
            document.getElementById('resultados').style.display = 'block';
        }
    }
</script>
</body>
</html>
