<!DOCTYPE html>
<html lang="es">
<head>
    <style>
        body { background: #0c0d0e; color: #fff; font-family: 'Segoe UI', sans-serif; }
        .card { background: #161719; border: 1px solid #333; border-radius: 12px; padding: 20px; max-width: 500px; margin: 20px auto; }
        .header { color: #39ff14; font-size: 1.2rem; font-weight: bold; border-bottom: 2px solid #39ff14; padding-bottom: 10px; margin-bottom: 15px; }
        .metric { font-size: 1.1rem; margin: 10px 0; display: flex; justify-content: space-between; }
        .dna-box { background: #1f2022; padding: 15px; border-left: 4px solid #00ffff; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <input id="l" placeholder="EQUIPO LOCAL" style="width:90%; padding:10px; margin:5px; background:#000; color:#fff; border:1px solid #333;">
    <input id="v" placeholder="EQUIPO VISITANTE" style="width:90%; padding:10px; margin:5px; background:#000; color:#fff; border:1px solid #333;">
    <button onclick="update()" style="width:95%; padding:15px; background:#39ff14; font-weight:bold; cursor:pointer;">GENERAR ANÁLISIS GLOBAL</button>

    <div id="display" style="display:none;">
        <div class="header" id="match"></div>
        <div class="metric"><span>⚽ Goles Sugeridos:</span> <span style="color:#39ff14">Más 2.5</span></div>
        <div class="metric"><span>⛳ Córners Proyectados:</span> <span style="color:#39ff14">Más 9.5</span></div>
        <div class="dna-box">
            <strong style="color:#00ffff;">Análisis Táctico de IA:</strong><br>
            <span id="tactica"></span>
        </div>
    </div>
</div>

<script>
    function update() {
        const l = document.getElementById('l').value;
        const v = document.getElementById('v').value;
        document.getElementById('match').innerText = (l + " VS " + v).toUpperCase();
        document.getElementById('tactica').innerText = "Bloque alto con transiciones rápidas por bandas.";
        document.getElementById('display').style.display = 'block';
    }
</script>
</body>
</html>
