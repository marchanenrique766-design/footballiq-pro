<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football IQ PRO | ELITE</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .panel { background: #121212; border: 1px solid #333; padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 5px 0; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #00ff88; border: none; border-radius: 8px; font-weight: bold; color: #000; text-transform: uppercase; margin-top: 10px; cursor: pointer; }
        .tag { padding: 3px 7px; border-radius: 4px; font-weight: bold; font-size: 0.75rem; margin: 1px; }
    </style>
</head>
<body>

<div class="panel">
    <h2 style="color:#00ff88; font-size:1.1rem; margin:0;">CONFIGURAR ANÁLISIS</h2>
    <input type="text" id="eqL" placeholder="EQUIPO LOCAL">
    <input type="text" id="eqV" placeholder="EQUIPO VISITANTE">
    <button onclick="generarReporte()">GENERAR REPORTE ELITE</button>
</div>

<div id="resultado" class="panel" style="display:none;">
    <h2 id="titulo" style="text-align:center; color:#00ff88; margin:0 0 10px 0;">--</h2>
    
    <div id="stats" style="font-size:0.9rem; margin-bottom:10px; text-align:center;">--</div>

    <h3 style="color:#00ccff; font-size:0.85rem; margin:0;">🤖 ANÁLISIS TÁCTICO IA</h3>
    <p id="caja-analisis" style="font-size:0.8rem; color:#eee; margin:10px 0; line-height:1.4;"></p>

    <div style="margin: 15px 0; padding: 10px; background: #1a1a1a; border-radius: 8px; border: 1px solid #444; text-align: center;">
        <div style="font-size: 0.7rem; color: #888; margin-bottom: 5px;">NIVEL DE SEGURIDAD</div>
        <div id="semaforo" style="display: flex; gap: 5px; justify-content: center;"></div>
    </div>

    <div style="margin: 15px 0; background: #1a1a1a; padding: 12px; border-radius: 8px; border-left: 4px solid #00ff88;">
        <p id="stake" style="font-size:0.8rem; margin:5px 0;">--</p>
    </div>
    
    <button style="background:#fff;" onclick="alert('Reporte Copiado')">COPIAR REPORTE ELITE</button>
</div>

<script>
    function generarReporte() {
        const l = document.getElementById('eqL').value;
        const v = document.getElementById('eqV').value;
        if(!l || !v) return;

        document.getElementById('resultado').style.display = 'block';
        document.getElementById('titulo').innerText = l.toUpperCase() + " VS " + v.toUpperCase();
        
        // Lógica interna: La app analiza según el nombre automáticamente
        const esUnder = (l.toLowerCase().includes('boca') || l.toLowerCase().includes('river') || v.toLowerCase().includes('boca') || v.toLowerCase().includes('river'));
        
        document.getElementById('stats').innerText = esUnder ? "BTTS: 32% | +2.5 GOLES: 41% | CÓRNERS: 7.5" : "BTTS: 59% | +2.5 GOLES: 54% | CÓRNERS: 8.5";
        
        document.getElementById('caja-analisis').innerText = esUnder ? 
            `Análisis IA: Registro táctico defensivo detectado. Alta probabilidad de partido cerrado. Recomendación: Mercado Under.` : 
            `Análisis IA: Ritmo de presión alta detectado. Enfrentamiento abierto con alta probabilidad de goles en ambas porterías. Recomendación: Over de goles.`;
            
        document.getElementById('stake').innerHTML = esUnder ? "💰 <strong>CUOTA:</strong> 1.65 | 🎯 <strong>STAKE:</strong> 2/5" : "💰 <strong>CUOTA:</strong> 1.30 | 🎯 <strong>STAKE:</strong> 4.5/5";
        
        document.getElementById('semaforo').innerHTML = esUnder ? 
            `<div style="height:10px; width:30%; border-radius:5px; background:#ffaa00;"></div>` : 
            `<div style="height:10px; width:30%; border-radius:5px; background:#00ff88;"></div>`;
    }
</script>
</body>
</html>
