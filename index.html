<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Football IQ PRO | ELITE</title>
    <style>
        body { background: #0c0c0c; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .panel { background: #161616; border: 1px solid #333; border-radius: 12px; padding: 25px; max-width: 600px; margin: auto; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; background: #000; border: 1px solid #444; color: #fff; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 18px; background: #00ff88; color: #000; border: none; border-radius: 6px; font-weight: 800; text-transform: uppercase; cursor: pointer; }
        .report-card { margin-top: 25px; padding: 20px; border-left: 4px solid #00ff88; background: #1a1a1a; display: none; }
        .metric { font-size: 1.1rem; margin-bottom: 10px; color: #00ccff; }
    </style>
</head>
<body>

<div class="panel">
    <h2 style="color: #00ff88;">Football IQ PRO | ELITE</h2>
    <input type="text" id="eqL" placeholder="EQUIPO LOCAL">
    <input type="text" id="eqV" placeholder="EQUIPO VISITANTE">
    <button onclick="generarReporte()">GENERAR ANÁLISIS DE VALOR</button>

    <div id="resultado" class="report-card">
        <h3 id="tituloMatch" style="color: #fff; margin-top:0;"></h3>
        <div class="metric">⚽ Goles: <strong id="valGoles" style="color:#fff;"></strong></div>
        <div class="metric">⛳ Córners: <strong id="valCorners" style="color:#fff;"></strong></div>
        <div class="metric">🟨 Tarjetas: <strong id="valTarjetas" style="color:#fff;"></strong></div>
        <div style="margin-top:15px; border-top:1px solid #333; padding-top:10px; font-size:0.9rem; color:#aaa;">
            <strong>📊 Análisis de Enfrentamiento:</strong><br>
            <span id="valSugerencia"></span>
        </div>
    </div>
</div>

<script>
    // BASE DE DATOS DE EQUIPOS (Aquí controlas la lógica)
    const db = {
        "BARCELONA": { goles: "Más 2.5", corners: "Más 9.5", tarjetas: "Más 4.5", sug: "Alta intensidad ofensiva, buscar mercados de corners." },
        "EMELEC": { goles: "Más 1.5", corners: "Más 8.5", tarjetas: "Más 3.5", sug: "Partido cerrado, control táctico en medio campo." },
        "AUCAS": { goles: "Más 1.5", corners: "Más 7.5", tarjetas: "Más 2.5", sug: "Tendencia a marcadores ajustados, esperar primeros minutos." }
    };

    function generarReporte() {
        const l = document.getElementById('eqL').value.trim().toUpperCase();
        const v = document.getElementById('eqV').value.trim().toUpperCase();
        if(!l || !v) return;

        // BÚSQUEDA DE DATOS
        const infoL = db[l] || { goles: "Más 1.5", corners: "Más 8.5", tarjetas: "Más 3.5", sug: "Análisis basado en métricas estándar de liga." };
        
        document.getElementById('resultado').style.display = 'block';
        document.getElementById('tituloMatch').innerText = l + " VS " + v;
        document.getElementById('valGoles').innerText = infoL.goles;
        document.getElementById('valCorners').innerText = infoL.corners;
        document.getElementById('valTarjetas').innerText = infoL.tarjetas;
        document.getElementById('valSugerencia').innerText = infoL.sug;
    }
</script>
</body>
</html>
