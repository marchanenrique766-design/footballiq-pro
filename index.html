<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOOTBALLIQ PRO</title>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #121212; padding: 20px; border-radius: 15px; border: 1px solid #333; max-width: 400px; margin: auto; }
        h1 { color: #00ff88; text-align: center; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; background: #1a1a1a; border: 1px solid #444; border-radius: 8px; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #00ff88; color: black; border: none; borderRadius: 8px; font-weight: bold; cursor: pointer; }
        #resultado { margin-top: 20px; padding: 20px; border: 1px solid #00ff88; border-radius: 15px; background: #000; max-width: 400px; margin: 20px auto; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>FOOTBALLIQ PRO</h1>
        <input type="text" id="equipoA" placeholder="EQUIPO A (LOCAL)">
        <input type="text" id="equipoB" placeholder="EQUIPO B (VISITANTE)">
        <button onclick="analizar()">INICIAR ANÁLISIS</button>
    </div>
    <div id="resultado"></div>

    <script>
        function analizar() {
            const res = document.getElementById('resultado');
            res.style.display = 'block';
            res.innerHTML = '<h2 style="color:#00ff88">ANÁLISIS: PSG VS ARSENAL</h2><p>⚽ BLOQUE ALTO Y TRANSICIONES RÁPIDAS</p><p style="color:#ff4444">⚠ ALTO RIESGO</p>';
        }
    </script>
</body>
</html>
