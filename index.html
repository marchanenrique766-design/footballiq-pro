<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FootballIQ PRO</title>
    <style>
        body { background-color: #0d0d0d; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .app-container { width: 100%; max-width: 400px; background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        h1 { color: #38bdf8; font-size: 24px; text-align: center; }
        .input-group { margin: 20px 0; }
        label { font-size: 12px; color: #888; }
        input { width: 100%; padding: 12px; margin-top: 8px; background: #000; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #004d26; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="app-container">
        <h1>FootballIQ PRO</h1>
        <div class="input-group">
            <label>EQUIPO A (LOCAL)</label>
            <input type="text" placeholder="Ej. Chelsea, Real Madrid">
        </div>
        <div class="input-group">
            <label>EQUIPO B (VISITANTE)</label>
            <input type="text" placeholder="Ej. Arsenal, Barcelona">
        </div>
        <button>INICIAR ANÁLISIS</button>
    </div>
</body>
</html>
