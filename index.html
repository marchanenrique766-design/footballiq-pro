<script>
    function analizarGlobal() {
        const l = document.getElementById('eqL').value.trim().toUpperCase();
        const v = document.getElementById('eqV').value.trim().toUpperCase();
        if(!l || !v) return;

        // --- MOTOR DE DETECCIÓN DE FRICCIÓN ---
        // Definimos qué equipos son "defensivos" o qué partidos son "cerrados"
        const equiposDefensivos = ["LIGA", "EMELEC", "URUGUAY", "ITALIA"];
        const esPartidoCerrado = (equiposDefensivos.includes(l) || equiposDefensivos.includes(v));

        let pronostico = {
            goles: "Más 2.5",
            corners: "Más 9.5",
            tarjetas: "Más 4.5",
            analisis: "Partido abierto, alta frecuencia de transiciones ofensivas."
        };

        // Si el motor detecta fricción, ajustamos el pronóstico a un modo "Seguridad"
        if (esPartidoCerrado) {
            pronostico.goles = "Menos 2.5"; // Pronóstico de fricción
            pronostico.corners = "Más 7.5";
            pronostico.tarjetas = "Más 5.5"; // ¡Más fricción = más tarjetas!
            pronostico.analisis = "Partido altamente friccionado y táctico. Se recomienda mercado de tarjetas.";
        }

        // Mostrar resultados con diseño limpio
        document.getElementById('resultado').style.display = 'block';
        document.getElementById('tMatch').innerText = l + " VS " + v;
        document.getElementById('vGoles').innerText = pronostico.goles;
        document.getElementById('vCorners').innerText = pronostico.corners;
        document.getElementById('vTarjetas').innerText = pronostico.tarjetas;
        document.getElementById('vSugerencia').innerText = pronostico.analisis;
    }
</script>
