<script>
    function generarReporte() {
        const l = document.getElementById('eqL').value.toUpperCase();
        const v = document.getElementById('eqV').value.toUpperCase();
        const modo = document.getElementById('modoIA').value;
        if(!l || !v) return;
        
        document.getElementById('resultado').style.display = 'block';
        document.getElementById('titulo').innerText = l + " VS " + v;
        
        // Lógica dinámica basada en los nombres de los equipos
        let analisis = "";
        let mercado = "";
        let stake = "";

        // Simulamos un análisis diferente si los equipos contienen ciertas palabras
        if (l.includes("BOCA") || v.includes("BOCA")) {
            mercado = (modo === 'seguridad') ? "Menos 2.5 Goles" : "Más 1.5 Goles";
            analisis = `Análisis H2H para ${l} vs ${v}: Se detecta una intensidad defensiva alta. `;
        } else {
            mercado = (modo === 'seguridad') ? "Menos 3.5 Goles" : "Córners +8.5";
            analisis = `Análisis H2H para ${l} vs ${v}: El historial reciente muestra un ritmo de juego abierto. `;
        }

        stake = (modo === 'seguridad') ? "STAKE 8/10 (Muy Alta)" : (modo === 'volumen') ? "STAKE 6/10 (Alta)" : "STAKE 3/10 (Moderada)";
        
        document.getElementById('caja-analisis').innerHTML = `${analisis} Se recomienda: <strong>${mercado}</strong>.`;
        document.getElementById('stake-profesional').innerText = stake;
    }
</script>
