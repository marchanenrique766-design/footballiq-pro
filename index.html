<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>FOOTBALLIQ PRO ELITE</title>
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1000px; margin: auto; }
        .panel { background: #121212; border: 1px solid #333; padding: 20px; border-radius: 15px; }
        h2 { color: #00ff88; margin-top: 0; }
        .stat-val { color: #00ff88; font-size: 24px; font-weight: bold; }
        .risk-box { border: 1px solid #ff4444; padding: 15px; border-radius: 10px; color: #ff4444; margin-top: 10px; }
    </style>
</head>
<body>

<div class="grid-container">
    <div class="panel">
        <h2>CONFIGURAR ANÁLISIS</h2>
        <input type="text" id="eqA" placeholder="EQUIPO A (LOCAL)" style="width:100%; padding:10px; margin-bottom:10px; background:#1a1a1a; border:1px solid #444; color:white; border-radius:8px;">
        <input type="text" id="eqB" placeholder="EQUIPO B (VISITANTE)" style="width:100%; padding:10px; margin-bottom:10px; background:#1a1a1a; border:1px solid #444; color:white; border-radius:8px;">
        <button onclick="activarPoderes()" style="width:100%; padding:15px; background:#00ff88; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">INICIAR ANÁLISIS ELITE</button>
        
        <div id="results" style="display:none; margin-top:20px;">
            <h3>TRADING STATS</h3>
            <p>Eficacia: <span class="stat-val">0%</span></p>
            <div class="risk-box">⚠ ADVERTENCIA: ALTO RIESGO</div>
        </div>
    </div>

    <div class="panel">
        <h2>MATRIZ DE RIESGO</h2>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div class="panel">Volumen Ofensivo<br><span class="stat-val">60%</span></div>
            <div class="panel">Inestabilidad<br><span class="stat-val">45%</span></div>
        </div>
        <h3 style="margin-top:20px;">STAKE SUGERIDO</h3>
        <div class="stat-val">3.0 / 5</div>
        <p style="font-size: 12px; color: #aaa;">Gestión de riesgo calculada para tu banca.</p>
    </div>
</div>

<script>
    function activarPoderes() {
        document.getElementById('results').style.display = 'block';
        // Aquí conectaremos la lógica de la IA después
    }
</script>
</body>
</html>
