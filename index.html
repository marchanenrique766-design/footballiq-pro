<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>FOOTBALLIQ PRO</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .grid { display: grid; grid-template-columns: 300px 1fr; gap: 20px; }
        .panel { background: #121212; border: 1px solid #333; padding: 20px; border-radius: 15px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #00ff88; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: black; }
        
        /* ESTO ES LO QUE LO MANTIENE OCULTO HASTA QUE SE ACTIVEN */
        #zona-resultados { display: none; }
        
        .caja-dato { border: 1px solid #333; padding: 15px; border-radius: 10px; margin-bottom: 10px; background: #1a1a1a; }
        .valor { color: #00ff88; font-size: 20px; font-weight: bold; display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="grid">
        <div class="panel">
            <h2>CONFIGURAR ANÁLISIS</h2>
            <input type="text" id="eqA" placeholder="LOCAL">
            <input type="text" id="eqB" placeholder="VISITANTE">
            <button onclick="procesar()">ANALIZAR PARTIDO</button>
        </div>

        <div id="zona-resultados" class="panel">
            <h2>RESULTADOS DEL ANÁLISIS</h2>
            <div class="caja-dato">BTTS<span class="valor">62%</span></div>
            <div class="caja-dato">+2.5 GOLES<span class="valor">58%</span></div>
            <div class="caja-dato">CÓRNERS<span class="valor">Más de 9.5</span></div>
        </div>
    </div>
</div>

<script>
    function procesar() {
        const a = document.getElementById('eqA').value;
        const b = document.getElementById('eqB').value;
        
        if(a !== "" && b !== "") {
            document.getElementById('zona-resultados').style.display = 'block';
        } else {
            alert("Completa los campos");
        }
    }
</script>
</body>
</html>
